version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: calendar_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: calendar_app
      MYSQL_USER: calendar_user
      MYSQL_PASSWORD: calendar_password
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

  backend:
    image: node:18-alpine
    container_name: calendar_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=calendar_user
      - DB_PASSWORD=calendar_password
      - DB_NAME=calendar_app
      - JWT_SECRET=super_secret_jwt_key_padre_pio
      - PORT=5000
    command: >
      sh -c "npm install && npm start"
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    image: nginx:alpine
    container_name: calendar_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge