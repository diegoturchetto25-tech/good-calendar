<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendari — Liquid Glass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --glass:            rgba(255,255,255,0.22);
            --glass-hover:      rgba(255,255,255,0.34);
            --glass-border:     rgba(255,255,255,0.60);
            --glass-border-sub: rgba(255,255,255,0.30);
            --shadow:     0 8px 32px rgba(80,100,160,0.10), 0 2px 8px rgba(80,100,160,0.07), inset 0 1px 0 rgba(255,255,255,0.70);
            --shadow-lg:  0 24px 64px rgba(60,80,140,0.13), 0 6px 20px rgba(60,80,140,0.08), inset 0 1px 0 rgba(255,255,255,0.80);
            --shadow-xl:  0 40px 100px rgba(40,60,120,0.18), 0 12px 36px rgba(40,60,120,0.10), inset 0 1px 0 rgba(255,255,255,0.85);
            --blur:  blur(24px) saturate(180%);
            --blurL: blur(40px) saturate(200%);
            --blue:   #0A84FF;
            --violet: #5E5CE6;
            --green:  #30D158;
            --amber:  #FF9F0A;
            --red:    #FF453A;
            --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body {
            font-family: var(--font);
            -webkit-font-smoothing: antialiased;
            background:
                radial-gradient(ellipse 80% 60% at 15% 10%,  rgba(120,160,255,0.24) 0%, transparent 60%),
                radial-gradient(ellipse 70% 50% at 85% 20%,  rgba(160,120,255,0.18) 0%, transparent 55%),
                radial-gradient(ellipse 60% 70% at 50% 90%,  rgba(80,200,180,0.16) 0%, transparent 60%),
                linear-gradient(160deg, #e9eef8 0%, #e4e0f5 35%, #ddeef6 65%, #e6f0ea 100%);
        }
        #root { position: relative; z-index: 1; height: 100vh; }

        /* Orbs */
        #orbs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
        .orb  { position:absolute; border-radius:50%; filter:blur(60px); }
        @keyframes drift {
            0%   { transform: translate(0,0) scale(1); }
            50%  { transform: translate(15px,-12px) scale(1.04); }
            100% { transform: translate(-8px,14px) scale(0.97); }
        }

        /* Glass primitives */
        .glass {
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
        }
        .glass-lg {
            background: var(--glass);
            backdrop-filter: var(--blurL);
            -webkit-backdrop-filter: var(--blurL);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-lg);
        }
        .glass-xl {
            background: rgba(255,255,255,0.28);
            backdrop-filter: var(--blurL);
            -webkit-backdrop-filter: var(--blurL);
            border: 1px solid rgba(255,255,255,0.68);
            box-shadow: var(--shadow-xl);
        }
        .glass-inset {
            background: rgba(255,255,255,0.16);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.35);
        }

        /* Inputs */
        .g-input {
            background: rgba(255,255,255,0.30);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.55);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.06), 0 1px 0 rgba(255,255,255,0.8);
            border-radius: 12px; padding: 10px 14px;
            font-family: var(--font); font-size: 14px; color: #1a1a2e;
            width: 100%; outline: none; transition: all .2s;
        }
        .g-input::placeholder { color: rgba(60,60,120,0.35); }
        .g-input:focus {
            background: rgba(255,255,255,0.48);
            border-color: rgba(10,132,255,0.5);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.04), 0 0 0 3px rgba(10,132,255,0.12), 0 1px 0 rgba(255,255,255,0.9);
        }
        select.g-input { cursor: pointer; }
        textarea.g-input { resize: none; }

        /* Buttons */
        .btn-p {
            background: linear-gradient(160deg, rgba(10,132,255,0.92), rgba(10,100,240,0.96));
            border: 1px solid rgba(10,132,255,0.40);
            box-shadow: 0 4px 16px rgba(10,132,255,0.30), inset 0 1px 0 rgba(255,255,255,0.25);
            color: #fff; border-radius: 12px; padding: 10px 20px;
            font-family: var(--font); font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all .2s; letter-spacing: -.01em;
        }
        .btn-p:hover { box-shadow: 0 6px 24px rgba(10,132,255,0.40), inset 0 1px 0 rgba(255,255,255,0.30); transform: translateY(-1px); }
        .btn-p:disabled { opacity:.5; cursor:not-allowed; transform:none; }
        .btn-g {
            background: var(--glass); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border); box-shadow: var(--shadow);
            border-radius: 12px; padding: 9px 18px;
            font-family: var(--font); font-size: 14px; font-weight: 500;
            color: rgba(30,30,80,0.75); cursor: pointer; transition: all .2s;
        }
        .btn-g:hover { background: var(--glass-hover); transform: translateY(-1px); }

        /* Text */
        .tp  { color: rgba(15,15,40,0.88); }
        .ts  { color: rgba(40,40,90,0.55); }
        .tm  { color: rgba(60,60,120,0.38); }
        .ta  { color: var(--blue); }
        .tv  { color: var(--violet); }

        /* Calendar cells */
        .cal-cell {
            background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.36);
            border-radius: 13px; min-height: 90px; padding: 8px;
            cursor: pointer; transition: all .18s ease; position: relative; overflow: hidden;
        }
        .cal-cell::after {
            content:''; position:absolute; top:0; left:0; right:0; height:1px;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,0.72),transparent);
        }
        .cal-cell:hover {
            background: rgba(255,255,255,0.30); border-color: rgba(255,255,255,0.58);
            box-shadow: 0 4px 20px rgba(10,132,255,0.10), inset 0 1px 0 rgba(255,255,255,0.75);
            transform: translateY(-1px);
        }
        .cal-today {
            background: linear-gradient(145deg,rgba(10,132,255,0.14),rgba(94,92,230,0.10));
            border: 1.5px solid rgba(10,132,255,0.42);
            box-shadow: 0 4px 20px rgba(10,132,255,0.14), inset 0 1px 0 rgba(255,255,255,0.65);
        }
        .cal-empty { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.14); border-radius: 13px; min-height: 90px; }
        .day-num-today {
            display:inline-flex; align-items:center; justify-content:center;
            width:22px; height:22px; border-radius:50%;
            background: linear-gradient(145deg,var(--blue),var(--violet));
            color:#fff; font-size:11px; font-weight:700;
            box-shadow: 0 2px 8px rgba(10,132,255,0.35);
        }

        /* Event chips */
        .chip { font-size:10.5px; font-weight:500; padding:2px 7px; border-radius:6px; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); border:1px solid transparent; cursor:pointer; transition:all .15s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; line-height:1.6; }
        .chip:hover { opacity:.82; transform:translateX(1px); }
        .chip-p   { background:linear-gradient(90deg,rgba(10,132,255,0.18),rgba(94,92,230,0.12)); border-color:rgba(10,132,255,0.25); color:rgba(0,60,180,0.90); }
        .chip-o   { background:linear-gradient(90deg,rgba(255,159,10,0.20),rgba(255,180,50,0.12)); border-color:rgba(255,159,10,0.30); color:rgba(140,70,0,0.90); }
        .chip-ov  { background:linear-gradient(90deg,rgba(255,69,58,0.16),rgba(255,159,10,0.12)); border-color:rgba(255,69,58,0.28); color:rgba(160,30,20,0.90); }

        /* Event cards (sidebar) */
        .ev-card { background:rgba(255,255,255,0.22); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.45); border-radius:13px; box-shadow:0 2px 10px rgba(80,100,160,0.06),inset 0 1px 0 rgba(255,255,255,0.65); transition:all .18s; position:relative; overflow:hidden; }
        .ev-card::after { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.80),transparent); }
        .ev-card:hover { background:rgba(255,255,255,0.34); box-shadow:0 4px 16px rgba(80,100,160,0.10),inset 0 1px 0 rgba(255,255,255,0.75); transform:translateX(2px); }

        /* Badges */
        .badge { font-size:11px; font-weight:600; padding:2px 9px; border-radius:20px; letter-spacing:.01em; }
        .ba  { background:rgba(94,92,230,0.15); border:1px solid rgba(94,92,230,0.30); color:var(--violet); }
        .bc  { background:rgba(255,159,10,0.15); border:1px solid rgba(255,159,10,0.30); color:rgba(160,80,0,.90); }
        .bu  { background:rgba(80,100,160,0.10); border:1px solid rgba(80,100,160,0.20); color:rgba(40,50,120,.70); }

        /* Status boxes */
        .box-err { background:rgba(255,69,58,0.10); border:1px solid rgba(255,69,58,0.22); border-radius:12px; padding:10px 14px; color:rgba(180,20,10,.85); font-size:13px; }
        .box-ok  { background:rgba(48,209,88,0.10); border:1px solid rgba(48,209,88,0.25); border-radius:12px; padding:10px 14px; color:rgba(0,120,40,.85); font-size:13px; }

        /* Modal */
        .modal-bg { position:fixed; inset:0; z-index:50; background:rgba(20,20,60,0.32); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); display:flex; align-items:center; justify-content:center; padding:16px; }

        /* Sidebar cal btn */
        .cbtn { width:100%; display:flex; align-items:center; padding:9px 12px; border-radius:12px; cursor:pointer; transition:all .18s; background:transparent; border:1px solid transparent; font-family:var(--font); font-size:13.5px; font-weight:500; color:rgba(30,30,80,.70); text-align:left; }
        .cbtn:hover { background:rgba(255,255,255,0.28); border-color:rgba(255,255,255,0.48); }
        .cbtn.active { background:linear-gradient(135deg,rgba(10,132,255,0.18),rgba(94,92,230,0.12)); border-color:rgba(10,132,255,0.28); color:rgba(0,50,170,.90); font-weight:600; box-shadow:0 2px 10px rgba(10,132,255,0.10),inset 0 1px 0 rgba(255,255,255,0.60); }

        /* View switcher */
        .vsw { display:flex; background:rgba(255,255,255,0.20); border:1px solid rgba(255,255,255,0.45); border-radius:12px; padding:3px; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
        .vbtn { padding:5px 14px; border-radius:9px; font-size:13px; font-weight:500; cursor:pointer; transition:all .18s; background:transparent; border:none; color:rgba(30,30,80,.55); font-family:var(--font); }
        .vbtn.active { background:rgba(255,255,255,0.72); color:rgba(10,132,255,.95); font-weight:600; box-shadow:0 2px 8px rgba(10,132,255,0.12),0 1px 3px rgba(0,0,0,0.06); }

        /* Scrollbars */
        ::-webkit-scrollbar { width:4px; height:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(100,120,200,0.20); border-radius:4px; }

        /* Animations */
        @keyframes fadeUp { from { opacity:0; transform:translateY(10px) scale(.98); } to { opacity:1; transform:none; } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .fu { animation: fadeUp .28s cubic-bezier(.22,1,.36,1) both; }
        .fi { animation: fadeIn .22s ease both; }

        /* Section label */
        .slabel { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:rgba(60,60,120,.42); }

        /* Glass separator */
        .gsep { height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.45),transparent); }

        /* Year grid */
        .yr-cell { background:rgba(255,255,255,0.16); border:1px solid rgba(255,255,255,0.34); border-radius:13px; padding:12px; cursor:pointer; transition:all .18s; }
        .yr-cell:hover { background:rgba(255,255,255,0.28); box-shadow:0 4px 20px rgba(10,132,255,0.10); transform:translateY(-2px); }

        /* Day view row */
        .drow { background:rgba(255,255,255,0.20); border:1px solid rgba(255,255,255,0.38); border-radius:12px; padding:10px 14px; transition:all .18s; }
        .drow:hover { background:rgba(255,255,255,0.32); box-shadow:0 3px 14px rgba(80,100,160,0.09); }

        /* Admin table */
        .atable th { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:rgba(40,40,90,.50); padding-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.30); }
        .atable td { padding:10px 12px 10px 0; border-bottom:1px solid rgba(255,255,255,0.20); color:rgba(15,15,40,.80); font-size:13px; }
        .atable tr:last-child td { border-bottom:none; }

        /* ── Liquid Glass Time Picker ────────────────────────────── */
        .tp-field {
            position: relative;
            width: 100%;
        }
        .tp-trigger {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: rgba(255,255,255,0.30);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.55);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.06), 0 1px 0 rgba(255,255,255,0.8);
            border-radius: 12px;
            cursor: pointer;
            transition: all .2s ease;
            font-family: var(--font);
            font-size: 14px;
            color: rgba(15,15,40,.88);
        }
        .tp-trigger:hover {
            background: rgba(255,255,255,0.42);
            border-color: rgba(255,255,255,0.70);
        }
        .tp-trigger.open {
            background: rgba(255,255,255,0.48);
            border-color: rgba(10,132,255,0.50);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.04), 0 0 0 3px rgba(10,132,255,0.12), 0 1px 0 rgba(255,255,255,0.9);
        }
        .tp-trigger.invalid {
            border-color: rgba(255,69,58,0.55);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.04), 0 0 0 3px rgba(255,69,58,0.10);
        }
        .tp-placeholder { color: rgba(60,60,120,0.38); }
        .tp-clock-icon { color: rgba(10,132,255,0.65); font-size: 16px; flex-shrink: 0; transition: color .2s; }
        .tp-trigger.open .tp-clock-icon { color: var(--blue); }

        /* Dropdown panel */
        .tp-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0; right: 0;
            z-index: 200;
            background: rgba(235,240,255,0.55);
            backdrop-filter: blur(28px) saturate(200%);
            -webkit-backdrop-filter: blur(28px) saturate(200%);
            border: 1px solid rgba(255,255,255,0.70);
            border-radius: 18px;
            box-shadow:
                0 24px 60px rgba(40,60,130,0.18),
                0 8px 24px rgba(40,60,130,0.10),
                inset 0 1px 0 rgba(255,255,255,0.90),
                inset 0 -1px 0 rgba(255,255,255,0.30);
            overflow: hidden;
            /* open animation */
            transform-origin: top center;
            animation: tpOpen .22s cubic-bezier(.22,1,.36,1) both;
        }
        .tp-dropdown::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95), transparent);
            border-radius: 18px 18px 0 0;
        }
        @keyframes tpOpen {
            from { opacity:0; transform: scale(.95) translateY(-6px); }
            to   { opacity:1; transform: scale(1) translateY(0); }
        }

        /* Column layout */
        .tp-columns {
            display: flex;
            gap: 0;
        }
        .tp-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-height: 200px;
            overflow-y: auto;
            padding: 6px 4px;
            scrollbar-width: none;
        }
        .tp-col::-webkit-scrollbar { display: none; }
        .tp-col-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: rgba(60,60,130,0.40);
            text-align: center;
            padding: 6px 0 4px;
            position: sticky;
            top: 0;
            background: rgba(235,240,255,0.50);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .tp-col-divider {
            width: 1px;
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.45) 20%, rgba(255,255,255,0.45) 80%, transparent);
            margin: 8px 0;
            flex-shrink: 0;
        }

        /* Time option row */
        .tp-option {
            padding: 7px 10px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 500;
            color: rgba(20,20,60,.78);
            cursor: pointer;
            text-align: center;
            transition: all .15s ease;
            border: 1px solid transparent;
            margin: 1px 2px;
            font-family: var(--font);
            font-variant-numeric: tabular-nums;
            letter-spacing: .01em;
        }
        .tp-option:hover {
            background: rgba(255,255,255,0.55);
            border-color: rgba(255,255,255,0.70);
            box-shadow: 0 2px 12px rgba(10,132,255,0.10), inset 0 1px 0 rgba(255,255,255,0.80);
            color: rgba(10,132,255,.90);
            transform: scale(1.02);
        }
        .tp-option.selected {
            background: linear-gradient(145deg, rgba(10,132,255,0.22), rgba(94,92,230,0.14));
            border-color: rgba(10,132,255,0.35);
            color: rgba(10,80,210,.95);
            font-weight: 700;
            box-shadow: 0 3px 16px rgba(10,132,255,0.18), inset 0 1px 0 rgba(255,255,255,0.70);
        }

        /* Footer confirm button */
        .tp-confirm {
            padding: 10px 16px;
            border-top: 1px solid rgba(255,255,255,0.35);
            display: flex;
            justify-content: flex-end;
            background: rgba(255,255,255,0.18);
        }
        .tp-confirm-btn {
            padding: 6px 18px;
            background: linear-gradient(145deg, rgba(10,132,255,0.92), rgba(10,100,240,0.96));
            border: 1px solid rgba(10,132,255,0.40);
            box-shadow: 0 3px 12px rgba(10,132,255,0.28), inset 0 1px 0 rgba(255,255,255,0.22);
            color: #fff;
            border-radius: 10px;
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font);
            transition: all .18s;
        }
        .tp-confirm-btn:hover { box-shadow: 0 4px 16px rgba(10,132,255,0.38), inset 0 1px 0 rgba(255,255,255,0.28); transform: translateY(-1px); }

        /* Validation hint */
        .tp-hint {
            font-size: 11.5px;
            color: rgba(220,50,30,.80);
            margin-top: 5px;
            padding-left: 2px;
            animation: fadeIn .18s ease both;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ── View transition ─────────────────────────────────────── */
        @keyframes slideInFromLeft {
            from { opacity:0; transform: translateX(-18px) scale(.98); }
            to   { opacity:1; transform: translateX(0) scale(1); }
        }
        @keyframes slideInFromRight {
            from { opacity:0; transform: translateX(18px) scale(.98); }
            to   { opacity:1; transform: translateX(0) scale(1); }
        }
        .slide-in-left  { animation: slideInFromLeft  .26s cubic-bezier(.22,1,.36,1) both; }
        .slide-in-right { animation: slideInFromRight .26s cubic-bezier(.22,1,.36,1) both; }

        /* ── Day number clickable ─────────────────────────────────── */
        .day-num-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50%;
            font-size: 11px; font-weight: 600; color: rgba(40,40,90,.65);
            cursor: pointer; transition: all .16s ease;
            border: 1px solid transparent;
        }
        .day-num-btn:hover {
            background: rgba(10,132,255,0.14);
            border-color: rgba(10,132,255,0.28);
            color: var(--blue);
            box-shadow: 0 0 10px rgba(10,132,255,0.18);
        }
        .year-day-num {
            font-size: 8.5px; font-weight: 400; color: rgba(40,40,90,.65);
            border-radius: 50%; width: 14px; height: 14px;
            display: inline-flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all .14s ease;
        }
        .year-day-num:hover {
            background: rgba(10,132,255,0.18) !important;
            color: var(--blue) !important;
            font-weight: 600;
        }

        /* ── Day view enhanced ───────────────────────────────────── */
        .dv-back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.28);
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 10px; padding: 6px 14px;
            font-size: 12.5px; font-weight: 600; color: rgba(10,132,255,.85);
            cursor: pointer; transition: all .18s;
            font-family: var(--font); margin-bottom: 16px;
        }
        .dv-back-btn:hover { background: rgba(255,255,255,0.44); transform: translateX(-2px); }

        /* ── Liquid Glass Date Picker ─────────────────────────────── */
        .dp-field  { position: relative; width: 100%; }

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useContext, createContext } = React;
const API_BASE = 'http://ec2-3-250-134-145.eu-west-1.compute.amazonaws.com:5000/api';

async function fetchAPI(endpoint, options = {}) {
    const res = await fetch(`${API_BASE}${endpoint}`, {
        ...options,
        headers: { 'Content-Type': 'application/json', ...options.headers }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `Errore ${res.status}`);
    return data;
}

/* ═══════════════════════════════════════════════════════════════
   GLASS ALERT SYSTEM
   ═══════════════════════════════════════════════════════════════ */

// ── Toast Context ─────────────────────────────────────────────
const ToastCtx = createContext(null);

const TOAST_ICONS = {
    error:   'ph-x-circle',
    success: 'ph-check-circle',
    warning: 'ph-warning',
    info:    'ph-info',
};
const TOAST_TITLES = {
    error:   'Errore',
    success: 'Completato',
    warning: 'Attenzione',
    info:    'Info',
};
const TOAST_DURATION = { error: 5500, success: 4000, warning: 5000, info: 4500 };

// ── Single Toast ──────────────────────────────────────────────
function GlassToast({ id, type, title, message, onRemove }) {
    const [leaving, setLeaving] = useState(false);
    const [progress, setProgress] = useState(100);
    const duration = TOAST_DURATION[type] || 4500;
    const startRef = useRef(null);
    const rafRef   = useRef(null);

    const dismiss = useCallback(() => {
        setLeaving(true);
        cancelAnimationFrame(rafRef.current);
        setTimeout(() => onRemove(id), 220);
    }, [id, onRemove]);

    // Auto-dismiss with progress bar
    useEffect(() => {
        startRef.current = performance.now();
        const tick = (now) => {
            const elapsed = now - startRef.current;
            const pct = Math.max(0, 100 - (elapsed / duration) * 100);
            setProgress(pct);
            if (pct > 0) rafRef.current = requestAnimationFrame(tick);
            else dismiss();
        };
        rafRef.current = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafRef.current);
    }, []);

    // ESC key dismiss
    useEffect(() => {
        const h = (e) => { if (e.key === 'Escape') dismiss(); };
        document.addEventListener('keydown', h);
        return () => document.removeEventListener('keydown', h);
    }, [dismiss]);

    return (
        <div
            className={`g-toast g-toast-${type}${leaving ? ' leaving' : ' entering'}`}
            role="alert"
            aria-live={type === 'error' ? 'assertive' : 'polite'}
        >
            <div className="g-toast-icon">
                <i className={`ph ${TOAST_ICONS[type]}`}></i>
            </div>
            <div className="g-toast-body">
                <div className="g-toast-title">{title || TOAST_TITLES[type]}</div>
                {message && <div className="g-toast-msg">{message}</div>}
            </div>
            <button
                className="g-toast-close"
                onClick={dismiss}
                aria-label="Chiudi notifica"
            >
                <i className="ph ph-x"></i>
            </button>
            <div
                className="g-toast-progress"
                style={{ width: `${progress}%` }}
            ></div>
        </div>
    );
}

// ── Toast Container (renders into #glass-toast-root) ──────────
function GlassToastContainer({ toasts, removeToast }) {
    const el = document.getElementById('glass-toast-root');
    if (!el) return null;
    return ReactDOM.createPortal(
        toasts.map(t => (
            <GlassToast key={t.id} {...t} onRemove={removeToast} />
        )),
        el
    );
}

// ── Glass Confirm Dialog ──────────────────────────────────────
function GlassConfirm({ title, message, variant='danger', confirmLabel='Elimina', cancelLabel='Annulla', onConfirm, onCancel }) {
    // ESC = cancel
    useEffect(() => {
        const h = (e) => { if (e.key === 'Escape') onCancel(); };
        document.addEventListener('keydown', h);
        return () => document.removeEventListener('keydown', h);
    }, [onCancel]);

    const iconMap = { danger:'ph-trash', warning:'ph-warning', info:'ph-question' };
    return (
        <div className="g-confirm-overlay" onClick={onCancel}>
            <div className="g-confirm-box" onClick={e => e.stopPropagation()} role="dialog" aria-modal="true" aria-labelledby="gc-title">
                <div className={`g-confirm-icon-wrap ${variant}`}>
                    <i className={`ph ${iconMap[variant]||iconMap.danger}`}></i>
                </div>
                <div className="g-confirm-title" id="gc-title">{title}</div>
                <div className="g-confirm-msg">{message}</div>
                <div className="g-confirm-btns">
                    <button className="g-confirm-cancel" onClick={onCancel} autoFocus>{cancelLabel}</button>
                    <button className={`g-confirm-ok ${variant}`} onClick={onConfirm}>{confirmLabel}</button>
                </div>
            </div>
        </div>
    );
}

// ── Inline Field Error ────────────────────────────────────────
function FieldError({ message }) {
    if (!message) return null;
    return (
        <div className="field-err" role="alert">
            <i className="ph ph-warning-circle" style={{fontSize:'12px', flexShrink:0}}></i>
            <span>{message}</span>
        </div>
    );
}

// ── Toast Provider ────────────────────────────────────────────
function ToastProvider({ children }) {
    const [toasts,  setToasts]  = useState([]);
    const [confirm, setConfirm] = useState(null);
    let nextId = useRef(0);

    const showToast = useCallback(({ type='info', title='', message='' }) => {
        const id = ++nextId.current;
        setToasts(prev => [...prev, { id, type, title, message }]);
        return id;
    }, []);

    const removeToast = useCallback((id) => {
        setToasts(prev => prev.filter(t => t.id !== id));
    }, []);

    // Imperative helpers exposed on context
    const toast = {
        error:   (msg, title) => showToast({ type:'error',   title: title||'Errore',      message: msg }),
        success: (msg, title) => showToast({ type:'success', title: title||'Completato',  message: msg }),
        warning: (msg, title) => showToast({ type:'warning', title: title||'Attenzione',  message: msg }),
        info:    (msg, title) => showToast({ type:'info',    title: title||'Info',         message: msg }),
        confirm: ({ title, message, variant, confirmLabel, cancelLabel }) =>
            new Promise(resolve => {
                setConfirm({
                    title, message,
                    variant: variant || 'danger',
                    confirmLabel: confirmLabel || 'Conferma',
                    cancelLabel:  cancelLabel  || 'Annulla',
                    resolve,
                });
            }),
    };

    const handleConfirm = () => { confirm?.resolve(true);  setConfirm(null); };
    const handleCancel  = () => { confirm?.resolve(false); setConfirm(null); };

    return (
        <ToastCtx.Provider value={toast}>
            {children}
            <GlassToastContainer toasts={toasts} removeToast={removeToast} />
            {confirm && (
                <GlassConfirm
                    title={confirm.title}
                    message={confirm.message}
                    variant={confirm.variant}
                    confirmLabel={confirm.confirmLabel}
                    cancelLabel={confirm.cancelLabel}
                    onConfirm={handleConfirm}
                    onCancel={handleCancel}
                />
            )}
        </ToastCtx.Provider>
    );
}

const useToast = () => useContext(ToastCtx);

// ── Login ─────────────────────────────────────────────────────
function Login({ onLogin }) {
    const toast = useToast();
    const [isLogin,  setIsLogin]  = useState(true);
    const [username, setUsername] = useState('');
    const [email,    setEmail]    = useState('');
    const [password, setPassword] = useState('');
    const [loading,  setLoading]  = useState(false);
    const [touched,  setTouched]  = useState({});
    const [success,  setSuccess]  = useState('');

    const reset = () => { setTouched({}); setSuccess(''); setUsername(''); setEmail(''); setPassword(''); };
    const switchMode = () => { setIsLogin(!isLogin); reset(); };
    const touch = (f) => setTouched(p => ({ ...p, [f]: true }));

    // Field errors (only after touched)
    const errs = {};
    if (!isLogin && touched.username && !username.trim()) errs.username = 'Username obbligatorio';
    if (touched.email && !email.trim())                   errs.email    = 'Email obbligatoria';
    if (touched.email && email && !/\S+@\S+\.\S+/.test(email)) errs.email = 'Formato email non valido';
    if (touched.password && !password)                    errs.password = 'Password obbligatoria';
    if (touched.password && !isLogin && password.length < 6) errs.password = 'Minimo 6 caratteri';

    const handleSubmit = async (e) => {
        e.preventDefault();
        // Touch all fields to show errors
        const allTouched = { email:true, password:true };
        if (!isLogin) allTouched.username = true;
        setTouched(allTouched);
        if (Object.keys(errs).length > 0) {
            toast.error('Compila tutti i campi obbligatori.', 'Campi mancanti');
            return;
        }
        setLoading(true);
        try {
            if (isLogin) {
                const d = await fetchAPI('/auth/login', { method:'POST', body:JSON.stringify({ email, password }) });
                onLogin({ username:d.username, token:d.token, role:d.role });
            } else {
                await fetchAPI('/auth/register', { method:'POST', body:JSON.stringify({ username, email, password }) });
                toast.success('Ora puoi accedere con le tue credenziali.', 'Registrazione completata!');
                setIsLogin(true); setUsername(''); setPassword(''); setTouched({});
            }
        } catch(err) {
            const msg = err.message || 'Errore di connessione.';
            if (msg.toLowerCase().includes('email')) toast.error('Questo indirizzo email è già registrato.', 'Email già in uso');
            else if (msg.toLowerCase().includes('username')) toast.error('Questo username è già in uso.', 'Username non disponibile');
            else if (msg.toLowerCase().includes('credenziali') || msg.toLowerCase().includes('password')) toast.error('Email o password non corretti.', 'Accesso negato');
            else toast.error(msg, 'Errore');
        }
        finally { setLoading(false); }
    };

    return (
        <div className="min-h-screen flex items-center justify-center p-4">
            <div className="glass-xl rounded-3xl p-10 w-full max-w-md fu" style={{borderRadius:'28px'}}>
                <div className="flex flex-col items-center mb-8">
                    <div className="glass rounded-2xl p-4 mb-4" style={{boxShadow:'0 8px 32px rgba(10,132,255,0.22), inset 0 1px 0 rgba(255,255,255,0.80)'}}>
                        <i className="ph ph-calendar-check" style={{fontSize:'36px', color:'var(--blue)'}}></i>
                    </div>
                    <h1 className="text-2xl font-semibold tp" style={{letterSpacing:'-.03em'}}>
                        {isLogin ? 'Bentornato' : 'Crea Account'}
                    </h1>
                    <p className="ts text-sm mt-1">{isLogin ? 'Accedi ai tuoi calendari' : 'Inizia a organizzare la tua agenda'}</p>
                </div>

                <form onSubmit={handleSubmit} noValidate style={{display:'flex',flexDirection:'column',gap:'12px'}}>
                    {!isLogin && (
                        <div>
                            <label className="slabel block mb-1.5">Username <span style={{color:'var(--red)',opacity:.7}}>*</span></label>
                            <input type="text" value={username}
                                onChange={e=>setUsername(e.target.value)}
                                onBlur={()=>touch('username')}
                                className={`g-input${errs.username?' g-input-err':''}`}
                                placeholder="mario_rossi" aria-required="true" aria-describedby="err-username" />
                            <FieldError message={errs.username} />
                        </div>
                    )}
                    <div>
                        <label className="slabel block mb-1.5">Email <span style={{color:'var(--red)',opacity:.7}}>*</span></label>
                        <input type="email" value={email}
                            onChange={e=>setEmail(e.target.value)}
                            onBlur={()=>touch('email')}
                            className={`g-input${errs.email?' g-input-err':''}`}
                            placeholder="mario@esempio.it" aria-required="true" />
                        <FieldError message={errs.email} />
                    </div>
                    <div>
                        <label className="slabel block mb-1.5">Password <span style={{color:'var(--red)',opacity:.7}}>*</span></label>
                        <input type="password" value={password}
                            onChange={e=>setPassword(e.target.value)}
                            onBlur={()=>touch('password')}
                            className={`g-input${errs.password?' g-input-err':''}`}
                            placeholder="••••••••" aria-required="true" />
                        <FieldError message={errs.password} />
                    </div>
                    <button type="submit" disabled={loading} className="btn-p w-full mt-1" style={{padding:'12px'}}>
                        {loading ? 'Caricamento…' : (isLogin ? 'Accedi' : 'Registrati')}
                    </button>
                </form>

                <p className="text-center text-sm ts mt-6">
                    {isLogin ? 'Non hai un account? ' : 'Hai già un account? '}
                    <button onClick={switchMode} className="ta font-semibold" style={{background:'none',border:'none',cursor:'pointer',fontFamily:'var(--font)',fontSize:'14px'}}>
                        {isLogin ? 'Registrati' : 'Accedi'}
                    </button>
                </p>
            </div>
        </div>
    );
}

// ── Change Password Modal ─────────────────────────────────────
function ChangePasswordModal({ token, onClose }) {
    const toast = useToast();
    const [oldPwd,  setOldPwd]  = useState('');
    const [newPwd,  setNewPwd]  = useState('');
    const [confirm, setConfirm] = useState('');
    const [loading, setLoading] = useState(false);
    const [touched, setTouched] = useState({});
    const touch = (f) => setTouched(p => ({ ...p, [f]: true }));

    const errs = {};
    if (touched.oldPwd  && !oldPwd)                       errs.oldPwd  = 'Inserisci la password attuale';
    if (touched.newPwd  && !newPwd)                       errs.newPwd  = 'Inserisci la nuova password';
    if (touched.newPwd  && newPwd && newPwd.length < 6)   errs.newPwd  = 'Minimo 6 caratteri';
    if (touched.confirm && !confirm)                      errs.confirm = 'Conferma la nuova password';
    if (touched.confirm && confirm && newPwd !== confirm) errs.confirm = 'Le password non coincidono';

    const handleSubmit = async (e) => {
        e.preventDefault();
        setTouched({ oldPwd:true, newPwd:true, confirm:true });
        if (newPwd !== confirm) { toast.error('Le password non coincidono.', 'Errore conferma'); return; }
        if (!oldPwd || !newPwd || !confirm) { toast.error('Compila tutti i campi.', 'Campi mancanti'); return; }
        setLoading(true);
        try {
            const d = await fetchAPI('/auth/change-password', { method:'PUT', body:JSON.stringify({ oldPassword:oldPwd, newPassword:newPwd }), headers:{ 'Authorization':`Bearer ${token}` } });
            toast.success(d.message || 'Password aggiornata con successo.', 'Password cambiata');
            setOldPwd(''); setNewPwd(''); setConfirm(''); setTouched({});
            setTimeout(onClose, 1200);
        } catch(err) { toast.error(err.message, 'Errore'); }
        finally { setLoading(false); }
    };

    return (
        <div className="modal-bg fi">
            <div className="glass-xl rounded-3xl p-7 w-full max-w-md fu" style={{borderRadius:'24px'}}>
                <div className="flex justify-between items-center mb-6">
                    <div className="flex items-center gap-3">
                        <div className="glass rounded-xl p-2.5"><i className="ph ph-lock-key" style={{fontSize:'20px',color:'var(--violet)'}}></i></div>
                        <span className="font-semibold tp" style={{fontSize:'16px'}}>Cambia Password</span>
                    </div>
                    <button onClick={onClose} style={{padding:'7px',background:'rgba(255,255,255,0.30)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',border:'1px solid rgba(255,255,255,0.55)',borderRadius:'11px',cursor:'pointer',transition:'all .18s',color:'rgba(60,60,120,.55)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                        <i className="ph ph-x" style={{fontSize:'15px'}}></i>
                    </button>
                </div>
                <form onSubmit={handleSubmit} noValidate style={{display:'flex',flexDirection:'column',gap:'12px'}}>
                    {[
                        ['oldPwd',  'Password Attuale', oldPwd,  setOldPwd],
                        ['newPwd',  'Nuova Password',   newPwd,  setNewPwd],
                        ['confirm', 'Conferma Password',confirm, setConfirm],
                    ].map(([key, label, val, setter]) => (
                        <div key={key}>
                            <label className="slabel block mb-1.5">{label} <span style={{color:'var(--red)',opacity:.7}}>*</span></label>
                            <input type="password" value={val}
                                onChange={e=>setter(e.target.value)}
                                onBlur={()=>touch(key)}
                                className={`g-input${errs[key]?' g-input-err':''}`}
                                placeholder="••••••••" aria-required="true" />
                            <FieldError message={errs[key]} />
                        </div>
                    ))}
                    <div className="flex justify-end gap-3 pt-1">
                        <button type="button" onClick={onClose} className="btn-g">Chiudi</button>
                        <button type="submit" disabled={loading} className="btn-p">{loading ? 'Salvataggio…' : 'Aggiorna'}</button>
                    </div>
                </form>
            </div>
        </div>
    );
}

// ── Liquid Glass Date Picker ──────────────────────────────────
function DatePickerField({ label, value, onChange, required }) {
    const { useState: us, useEffect: ue, useRef: ur } = React;
    const [open,      setOpen]   = us(false);
    // value is 'YYYY-MM-DD' or ''
    const parseVal = (v) => { if (!v) return null; const [y,m,d]=v.split('-').map(Number); return {year:y,month:m-1,day:d}; };
    const sel = parseVal(value);
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

    const [viewYear,  setViewYear]  = us(sel?.year  || today.getFullYear());
    const [viewMonth, setViewMonth] = us(sel?.month ?? today.getMonth());
    const ref = ur(null);

    // Close on outside click
    ue(() => {
        if (!open) return;
        const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', h);
        return () => document.removeEventListener('mousedown', h);
    }, [open]);

    // Sync view to selected value when it changes externally
    ue(() => {
        if (sel) { setViewYear(sel.year); setViewMonth(sel.month); }
    }, [value]);

    const prevMonth = () => { if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); };
    const nextMonth = () => { if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); };

    const selectDay = (y, m, d) => {
        const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        onChange(ds); setOpen(false);
    };

    // Build calendar grid
    const buildGrid = () => {
        const firstDay = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
        const offset   = firstDay === 0 ? 6 : firstDay - 1;        // Mon-based
        const daysInM  = new Date(viewYear, viewMonth+1, 0).getDate();
        const prevDays = new Date(viewYear, viewMonth, 0).getDate();
        const cells    = [];
        // prev month tail
        for (let i=0;i<offset;i++) {
            const d = prevDays - offset + 1 + i;
            const pm = viewMonth===0 ? 11 : viewMonth-1;
            const py = viewMonth===0 ? viewYear-1 : viewYear;
            cells.push({ day:d, month:pm, year:py, type:'other' });
        }
        // current month
        for (let d=1;d<=daysInM;d++) cells.push({ day:d, month:viewMonth, year:viewYear, type:'current' });
        // next month fill to complete last row
        const remaining = (7 - cells.length % 7) % 7;
        const nm = viewMonth===11?0:viewMonth+1, ny = viewMonth===11?viewYear+1:viewYear;
        for (let d=1;d<=remaining;d++) cells.push({ day:d, month:nm, year:ny, type:'other' });
        return cells;
    };

    const displayValue = value ? new Date(value+'T12:00:00').toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'}) : null;
    const monthLabel   = new Date(viewYear, viewMonth, 1).toLocaleDateString('it-IT',{month:'long',year:'numeric'});

    return (
        <div className="dp-field" ref={ref}>
            {label && <label className="slabel block mb-1.5">{label}{required?' *':''}</label>}
            <div className={`dp-trigger${open?' open':''}`} onClick={()=>setOpen(o=>!o)}>
                <span style={displayValue?{}:{color:'rgba(60,60,120,0.38)'}}>
                    {displayValue || 'Seleziona data'}
                </span>
                <i className="ph ph-calendar dp-cal-icon"></i>
            </div>

            {open && (
                <div className="dp-dropdown">
                    {/* Month nav */}
                    <div className="dp-header">
                        <button className="dp-nav-btn" onClick={e=>{e.stopPropagation();prevMonth();}}>
                            <i className="ph ph-caret-left"></i>
                        </button>
                        <span className="dp-month-label">{monthLabel}</span>
                        <button className="dp-nav-btn" onClick={e=>{e.stopPropagation();nextMonth();}}>
                            <i className="ph ph-caret-right"></i>
                        </button>
                    </div>

                    {/* Weekday labels */}
                    <div className="dp-wdays">
                        {['L','M','M','G','V','S','D'].map((d,i)=>(
                            <div key={i} className="dp-wday">{d}</div>
                        ))}
                    </div>

                    {/* Day cells */}
                    <div className="dp-days">
                        {buildGrid().map((cell,i)=>{
                            const ds=`${cell.year}-${String(cell.month+1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}`;
                            const isToday    = ds===todayStr;
                            const isSelected = ds===value;
                            const isOther    = cell.type==='other';
                            let cls = 'dp-day';
                            if (isOther)    cls += ' other-month';
                            if (isToday && !isSelected) cls += ' today';
                            if (isSelected) cls += ' selected';
                            return (
                                <div key={i} className={cls}
                                    onClick={e=>{e.stopPropagation();selectDay(cell.year,cell.month,cell.day);}}>
                                    {cell.day}
                                </div>
                            );
                        })}
                    </div>
                </div>
            )}
        </div>
    );
}

// ── Liquid Glass Time Picker ──────────────────────────────────
function TimePickerField({ label, value, onChange, invalid, onFocus }) {
    const { useState: useLocalState, useEffect: useLocalEffect, useRef } = React;
    const [open,        setOpen]   = useLocalState(false);
    const [selHour,     setSelHour]= useLocalState(value ? value.substring(0,2) : null);
    const [selMin,      setSelMin] = useLocalState(value ? value.substring(3,5) : null);
    const ref  = useRef(null);
    const hrRef= useRef(null);
    const mnRef= useRef(null);

    const HOURS   = Array.from({length:24}, (_,i) => String(i).padStart(2,'0'));
    const MINUTES = ['00','05','10','15','20','25','30','35','40','45','50','55'];

    // Scroll selected item into view when opening
    useLocalEffect(() => {
        if (!open) return;
        if (selHour && hrRef.current) {
            const el = hrRef.current.querySelector(`[data-h="${selHour}"]`);
            if (el) el.scrollIntoView({ block:'center', behavior:'smooth' });
        }
        if (selMin && mnRef.current) {
            const el = mnRef.current.querySelector(`[data-m="${selMin}"]`);
            if (el) el.scrollIntoView({ block:'center', behavior:'smooth' });
        }
    }, [open]);

    // Close on outside click
    useLocalEffect(() => {
        if (!open) return;
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
    }, [open]);

    // Sync internal state when external value changes
    useLocalEffect(() => {
        if (value) { setSelHour(value.substring(0,2)); setSelMin(value.substring(3,5)); }
        else { setSelHour(null); setSelMin(null); }
    }, [value]);

    const confirm = () => {
        if (selHour !== null && selMin !== null) {
            onChange(`${selHour}:${selMin}`);
        }
        setOpen(false);
    };

    const pickHour = (h) => {
        setSelHour(h);
        // auto-confirm if minute already set
        if (selMin !== null) { onChange(`${h}:${selMin}`); }
    };
    const pickMin = (m) => {
        setSelMin(m);
        if (selHour !== null) { onChange(`${selHour}:${m}`); }
    };

    const displayValue = value || null;

    return (
        <div className="tp-field" ref={ref}>
            <label className="slabel block mb-1.5">{label} *</label>
            <div
                className={`tp-trigger${open?' open':''}${invalid&&!value?' invalid':''}`}
                onClick={() => { setOpen(o => !o); if (onFocus) onFocus(); }}
            >
                <span style={displayValue ? {} : {color:'rgba(60,60,120,0.38)'}}>
                    {displayValue || '––:––'}
                </span>
                <i className="ph ph-clock tp-clock-icon"></i>
            </div>

            {/* Validation hint */}
            {invalid && !value && (
                <div className="tp-hint">
                    <i className="ph ph-warning-circle" style={{fontSize:'12px'}}></i>
                    Ora inizio e fine obbligatorie
                </div>
            )}

            {/* Dropdown */}
            {open && (
                <div className="tp-dropdown">
                    <div className="tp-columns">
                        {/* Hours */}
                        <div style={{flex:1,display:'flex',flexDirection:'column'}}>
                            <div className="tp-col-label">Ore</div>
                            <div className="tp-col" ref={hrRef}>
                                {HOURS.map(h => (
                                    <div key={h} data-h={h}
                                        className={`tp-option${selHour===h?' selected':''}`}
                                        onClick={() => pickHour(h)}>
                                        {h}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="tp-col-divider"></div>

                        {/* Minutes */}
                        <div style={{flex:1,display:'flex',flexDirection:'column'}}>
                            <div className="tp-col-label">Min</div>
                            <div className="tp-col" ref={mnRef}>
                                {MINUTES.map(m => (
                                    <div key={m} data-m={m}
                                        className={`tp-option${selMin===m?' selected':''}`}
                                        onClick={() => pickMin(m)}>
                                        {m}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="tp-confirm">
                        <button className="tp-confirm-btn" onClick={confirm}
                            disabled={selHour===null||selMin===null}
                            style={{opacity:selHour===null||selMin===null?.45:1}}>
                            Conferma
                        </button>
                    </div>
                </div>
            )}
        </div>
    );
}

// ── Event Modal ───────────────────────────────────────────────
function EventModal({ token, activeCalId, activeCalIsGlobal, userRole, selectedDate, editEvent, onClose, onSaved }) {
    const toast  = useToast();
    const isEdit = !!editEvent;
    const [loading,     setLoading]  = useState(false);
    const [title,       setTitle]    = useState(editEvent?.title || '');
    const [date,        setDate]     = useState(editEvent?.event_date?.substring(0,10) || selectedDate);
    const [time,        setTime]     = useState(editEvent?.event_time?.substring(0,5) || '');
    const [endTime,     setEndTime]  = useState(editEvent?.event_end_time?.substring(0,5) || '');
    const [description, setDesc]     = useState(editEvent?.description || '');
    const [touched,     setTouched]  = useState({});
    const touch = (f) => setTouched(p => ({ ...p, [f]: true }));

    // Field-level errors (only after touch)
    const errs = {};
    if (touched.title   && !title.trim())  errs.title   = 'Il titolo è obbligatorio';
    if (touched.date    && !date)          errs.date    = 'Seleziona una data';
    if (touched.time    && !time)          errs.time    = 'Seleziona l\'ora di inizio';
    if (touched.endTime && !endTime)       errs.endTime = 'Seleziona l\'ora di fine';
    if (touched.time && touched.endTime && time && endTime && time >= endTime)
        errs.endTime = 'L\'ora di fine deve essere successiva all\'inizio';

    if (activeCalIsGlobal && !['capo','admin'].includes(userRole)) {
        return (
            <div className="modal-bg fi">
                <div className="glass-xl rounded-3xl p-8 w-full max-w-sm text-center fu" style={{borderRadius:'24px'}}>
                    <i className="ph ph-lock" style={{fontSize:'48px',color:'var(--amber)',display:'block',marginBottom:'16px'}}></i>
                    <h3 className="font-semibold tp mb-2" style={{fontSize:'17px'}}>Accesso limitato</h3>
                    <p className="ts text-sm mb-6">Solo i <strong>Capo</strong> e gli <strong>Admin</strong> possono modificare eventi Ufficio.</p>
                    <button onClick={onClose} className="btn-g">Chiudi</button>
                </div>
            </div>
        );
    }

    const handleSubmit = async (e) => {
        e.preventDefault();
        setTouched({ title:true, date:true, time:true, endTime:true });

        // Validate all fields
        if (!title.trim()) { toast.error('Il titolo dell\'evento è obbligatorio.', 'Campo mancante'); return; }
        if (!date)         { toast.error('Seleziona una data per l\'evento.', 'Data mancante'); return; }
        if (!time)         { toast.error('Seleziona l\'ora di inizio.', 'Ora mancante'); return; }
        if (!endTime)      { toast.error('Seleziona l\'ora di fine.', 'Ora mancante'); return; }
        if (time >= endTime) { toast.error('L\'ora di fine deve essere successiva all\'ora di inizio.', 'Orario non valido'); return; }

        setLoading(true);
        try {
            if (isEdit) {
                await fetchAPI(`/events/${editEvent.id}`, { method:'PUT', body:JSON.stringify({ title, event_date:date, event_time:time, event_end_time:endTime, description }), headers:{ 'Authorization':`Bearer ${token}` } });
                toast.success(`"${title}" aggiornato con successo.`, 'Evento modificato');
            } else {
                await fetchAPI('/events', { method:'POST', body:JSON.stringify({ calendar_id:activeCalId, title, event_date:date, event_time:time, event_end_time:endTime, description }), headers:{ 'Authorization':`Bearer ${token}` } });
                toast.success(`"${title}" è stato aggiunto al calendario.`, 'Evento creato');
            }
            onSaved(); onClose();
        } catch(err) { toast.error(err.message, 'Errore salvataggio'); }
        finally { setLoading(false); }
    };

    const isOffice    = isEdit ? editEvent.source === 'office' : activeCalIsGlobal;
    const accentColor = isOffice ? 'var(--amber)' : 'var(--blue)';

    return (
        <div className="modal-bg fi">
            <div className="glass-xl fu" style={{borderRadius:'24px',padding:'28px',width:'100%',maxWidth:'440px'}}>

                    <button onClick={onClose} style={{padding:'7px',background:'rgba(255,255,255,0.30)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',border:'1px solid rgba(255,255,255,0.55)',borderRadius:'11px',cursor:'pointer',transition:'all .18s',color:'rgba(60,60,120,.55)',display:'flex',alignItems:'center',justifyContent:'center'}}
                        onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.48)'}

                                invalid={!!errs.endTime}

                    </div>

                    {/* Description */}
                    <div>
                        <label className="slabel block mb-1.5">Descrizione</label>

                    </div>
                </form>
            </div>
        </div>
    );
}
