<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Calendar App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- API BASE (NO MOCK MODE) ---
        const API_BASE = 'http://localhost:5000/api';

        async function fetchAPI(endpoint, options = {}) {
            const res = await fetch(`${API_BASE}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });
            const data = await res.json();
            if (!res.ok) {
                throw new Error(data.error || `Errore ${res.status}`);
            }
            return data;
        }

        // --- COMPONENTE MESSAGGIO ERRORE ---
        function ErrorBox({ message }) {
            if (!message) return null;
            return (
                <div className="mt-3 p-3 bg-red-50 border border-red-300 text-red-700 rounded-lg text-sm flex items-start space-x-2 fade-in">
                    <i className="ph ph-warning-circle text-lg flex-shrink-0 mt-0.5"></i>
                    <span>{message}</span>
                </div>
            );
        }

        // --- COMPONENTE SUCCESSO ---
        function SuccessBox({ message }) {
            if (!message) return null;
            return (
                <div className="mt-3 p-3 bg-green-50 border border-green-300 text-green-700 rounded-lg text-sm flex items-start space-x-2 fade-in">
                    <i className="ph ph-check-circle text-lg flex-shrink-0 mt-0.5"></i>
                    <span>{message}</span>
                </div>
            );
        }

        // --- COMPONENTE APP PRINCIPALE ---
        function App() {
            const [user, setUser] = useState(null);
            const [token, setToken] = useState(null);

            if (!user) {
                return <Login setAuth={(u, t) => { setUser(u); setToken(t); }} />;
            }

            return (
                <Dashboard
                    user={user}
                    token={token}
                    onLogout={() => { setUser(null); setToken(null); }}
                />
            );
        }

        // --- COMPONENTE LOGIN / REGISTRAZIONE ---
        function Login({ setAuth }) {
            const [isLogin, setIsLogin] = useState(true);
            const [username, setUsername] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [successMsg, setSuccessMsg] = useState('');

            const switchMode = () => {
                setIsLogin(!isLogin);
                setErrorMsg('');
                setSuccessMsg('');
                setUsername('');
                setEmail('');
                setPassword('');
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                setSuccessMsg('');
                setLoading(true);

                try {
                    if (isLogin) {
                        // Login usa EMAIL + PASSWORD
                        const data = await fetchAPI('/auth/login', {
                            method: 'POST',
                            body: JSON.stringify({ email, password })
                        });
                        setAuth(data.username, data.token);
                    } else {
                        // Registrazione usa USERNAME + EMAIL + PASSWORD
                        await fetchAPI('/auth/register', {
                            method: 'POST',
                            body: JSON.stringify({ username, email, password })
                        });
                        setSuccessMsg('Registrazione completata! Ora puoi accedere con la tua email.');
                        setIsLogin(true);
                        setUsername('');
                        setPassword('');
                    }
                } catch (err) {
                    setErrorMsg(err.message || 'Errore di connessione al server. Verifica che il backend sia attivo.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md fade-in">
                        <div className="flex justify-center mb-6 text-indigo-600">
                            <i className="ph ph-calendar-check text-6xl"></i>
                        </div>
                        <h2 className="text-2xl font-bold text-center text-gray-800 mb-8">
                            {isLogin ? 'Accedi ai tuoi Calendari' : 'Crea un Account'}
                        </h2>

                        <form onSubmit={handleSubmit} className="space-y-4">

                            {/* USERNAME — solo in registrazione */}
                            {!isLogin && (
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Username</label>
                                    <input
                                        type="text"
                                        required
                                        value={username}
                                        onChange={e => setUsername(e.target.value)}
                                        className="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                                        placeholder="mario_rossi"
                                    />
                                </div>
                            )}

                            {/* EMAIL */}
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Email</label>
                                <input
                                    type="email"
                                    required
                                    value={email}
                                    onChange={e => setEmail(e.target.value)}
                                    className="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                                    placeholder="mario@esempio.it"
                                />
                            </div>

                            {/* PASSWORD */}
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Password</label>
                                <input
                                    type="password"
                                    required
                                    value={password}
                                    onChange={e => setPassword(e.target.value)}
                                    className="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                                    placeholder={isLogin ? '••••••••' : 'Almeno 6 caratteri'}
                                />
                            </div>

                            {/* Messaggi errore / successo */}
                            <ErrorBox message={errorMsg} />
                            <SuccessBox message={successMsg} />

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-indigo-600 text-white py-2.5 rounded-lg hover:bg-indigo-700 transition font-semibold disabled:opacity-60"
                            >
                                {loading ? (
                                    <span className="flex items-center justify-center space-x-2">
                                        <i className="ph ph-spinner animate-spin"></i>
                                        <span>Caricamento...</span>
                                    </span>
                                ) : (isLogin ? 'Accedi' : 'Registrati')}
                            </button>
                        </form>

                        <p className="mt-5 text-center text-sm text-gray-600">
                            {isLogin ? "Non hai un account? " : "Hai già un account? "}
                            <button
                                onClick={switchMode}
                                className="text-indigo-600 font-semibold hover:underline"
                            >
                                {isLogin ? 'Registrati' : 'Accedi'}
                            </button>
                        </p>
                    </div>
                </div>
            );
        }

        // --- MODALE CAMBIO PASSWORD ---
        function ChangePasswordModal({ token, onClose }) {
            const [oldPassword, setOldPassword] = useState('');
            const [newPassword, setNewPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [successMsg, setSuccessMsg] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                setSuccessMsg('');

                if (newPassword !== confirmPassword) {
                    setErrorMsg('La nuova password e la conferma non coincidono.');
                    return;
                }

                setLoading(true);
                try {
                    const data = await fetchAPI('/auth/change-password', {
                        method: 'PUT',
                        body: JSON.stringify({ oldPassword, newPassword }),
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    setSuccessMsg(data.message || 'Password aggiornata con successo.');
                    setOldPassword('');
                    setNewPassword('');
                    setConfirmPassword('');
                } catch (err) {
                    setErrorMsg(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 fade-in">
                    <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-xl font-bold text-gray-800 flex items-center space-x-2">
                                <i className="ph ph-lock-key text-indigo-600 text-2xl"></i>
                                <span>Cambia Password</span>
                            </h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600">
                                <i className="ph ph-x text-xl"></i>
                            </button>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Password Attuale</label>
                                <input
                                    type="password"
                                    required
                                    value={oldPassword}
                                    onChange={e => setOldPassword(e.target.value)}
                                    className="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                                    placeholder="••••••••"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Nuova Password</label>
                                <input
                                    type="password"
                                    required
                                    value={newPassword}
                                    onChange={e => setNewPassword(e.target.value)}
                                    className="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                                    placeholder="Almeno 6 caratteri"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Conferma Nuova Password</label>
                                <input
                                    type="password"
                                    required
                                    value={confirmPassword}
                                    onChange={e => setConfirmPassword(e.target.value)}
                                    className="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                                    placeholder="••••••••"
                                />
                            </div>

                            <ErrorBox message={errorMsg} />
                            <SuccessBox message={successMsg} />

                            <div className="pt-2 flex justify-end space-x-3">
                                <button
                                    type="button"
                                    onClick={onClose}
                                    className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition"
                                >
                                    Chiudi
                                </button>
                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-semibold disabled:opacity-60"
                                >
                                    {loading ? 'Salvataggio...' : 'Aggiorna Password'}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // --- MODALE NUOVO EVENTO ---
        function NewEventModal({ token, activeCalId, selectedDate, onClose, onSaved }) {
            const [loading, setLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                const fd = new FormData(e.target);
                const eventData = {
                    calendar_id: activeCalId,
                    title: fd.get('title'),
                    event_date: fd.get('date'),
                    event_time: fd.get('time') || null,
                    event_end_time: fd.get('end_time') || null,
                    description: fd.get('desc') || ''
                };

                setLoading(true);
                try {
                    await fetchAPI('/events', {
                        method: 'POST',
                        body: JSON.stringify(eventData),
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    onSaved();
                    onClose();
                } catch (err) {
                    setErrorMsg(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 fade-in">
                    <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-xl font-bold text-gray-800">Nuovo Evento</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600">
                                <i className="ph ph-x text-xl"></i>
                            </button>
                        </div>

                        <form onSubmit={handleSubmit}>
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Titolo *</label>
                                    <input
                                        name="title"
                                        required
                                        className="w-full mt-1 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                                        placeholder="Es. Riunione con il team"
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Data *</label>
                                    <input
                                        name="date"
                                        type="date"
                                        required
                                        defaultValue={selectedDate}
                                        className="w-full mt-1 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                                    />
                                </div>

                                <div className="flex space-x-4">
                                    <div className="flex-1">
                                        <label className="block text-sm font-medium text-gray-700">
                                            Ora inizio
                                        </label>
                                        <input
                                            name="time"
                                            type="time"
                                            className="w-full mt-1 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                                        />
                                    </div>
                                    <div className="flex-1">
                                        <label className="block text-sm font-medium text-gray-700">Ora fine</label>
                                        <input
                                            name="end_time"
                                            type="time"
                                            className="w-full mt-1 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                                        />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Descrizione</label>
                                    <textarea
                                        name="desc"
                                        rows="3"
                                        className="w-full mt-1 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none resize-none"
                                        placeholder="Note aggiuntive..."
                                    ></textarea>
                                </div>

                                {/* Errore visibile (es. sovrapposizione) */}
                                <ErrorBox message={errorMsg} />

                                <div className="pt-2 flex justify-end space-x-3">
                                    <button
                                        type="button"
                                        onClick={onClose}
                                        className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition"
                                    >
                                        Annulla
                                    </button>
                                    <button
                                        type="submit"
                                        disabled={loading}
                                        className="px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-semibold disabled:opacity-60"
                                    >
                                        {loading ? 'Salvataggio...' : 'Salva Evento'}
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // --- DASHBOARD ---
        function Dashboard({ user, token, onLogout }) {
            const [calendars, setCalendars] = useState([]);
            const [activeCalId, setActiveCalId] = useState(null);
            const [events, setEvents] = useState([]);
            const [view, setView] = useState('Mese');
            const [currentDate, setCurrentDate] = useState(new Date());

            const [showNewEvent, setShowNewEvent] = useState(false);
            const [showChangePassword, setShowChangePassword] = useState(false);
            const [selectedDate, setSelectedDate] = useState('');

            // Padre Pio (per calendario Personale)
            const [padrePioThought, setPadrePioThought] = useState('');

            const authHeaders = { 'Authorization': `Bearer ${token}` };

            const loadCalendars = useCallback(async () => {
                try {
                    const data = await fetchAPI('/calendars', { headers: authHeaders });
                    setCalendars(data);
                    if (data.length > 0) setActiveCalId(data[0].id);
                } catch (err) {
                    console.error('Errore caricamento calendari:', err.message);
                }
            }, [token]);

            const loadEvents = useCallback(async (calId) => {
                if (!calId) return;
                try {
                    const data = await fetchAPI(`/events/${calId}`, { headers: authHeaders });
                    setEvents(data);
                } catch (err) {
                    console.error('Errore caricamento eventi:', err.message);
                }
            }, [token]);

            const loadPadrePioThought = useCallback(async () => {
                try {
                    const dateStr = currentDate.toISOString().split('T')[0];
                    const thoughtData = await fetchAPI(`/padrepio/thought/${dateStr}`, { headers: authHeaders });
                    setPadrePioThought(thoughtData.thought);
                } catch (err) {
                    setPadrePioThought('');
                }
            }, [currentDate, token]);

            useEffect(() => { loadCalendars(); }, []);

            useEffect(() => { loadEvents(activeCalId); }, [activeCalId, currentDate, view]);

            useEffect(() => {
                const activeCal = calendars.find(c => c.id === activeCalId);
                if (activeCal && activeCal.type === 'Personale') {
                    loadPadrePioThought();
                } else {
                    setPadrePioThought('');
                }
            }, [activeCalId, calendars, currentDate]);

            const activeCalendar = calendars.find(c => c.id === activeCalId);

            // --- RENDER VISTA MESE ---
            const renderMese = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDay = new Date(year, month, 1).getDay();
                const days = [];

                for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) {
                    days.push(<div key={`empty-${i}`} className="bg-gray-50 border border-gray-100 p-2 opacity-40 min-h-[90px]"></div>);
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const dayEvents = events.filter(e => e.event_date && e.event_date.startsWith(dateStr));
                    const isToday = new Date().toISOString().split('T')[0] === dateStr;

                    days.push(
                        <div key={d}
                            className={`min-h-[90px] bg-white border border-gray-200 p-2 cursor-pointer hover:bg-blue-50 transition ${isToday ? 'ring-2 ring-indigo-500 rounded-lg' : ''}`}
                            onClick={() => { setSelectedDate(dateStr); setShowNewEvent(true); }}>
                            <div className={`text-sm font-semibold mb-1 ${isToday ? 'text-indigo-600' : 'text-gray-700'}`}>{d}</div>
                            <div className="space-y-1">
                                {dayEvents.map(ev => (
                                    <div key={ev.id} className="text-xs bg-indigo-100 text-indigo-800 px-1.5 py-0.5 rounded truncate" title={ev.title}>
                                        {ev.event_time ? `${ev.event_time.substring(0,5)} ` : ''}{ev.title}
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="w-full h-full fade-in">
                        <div className="grid grid-cols-7 gap-px bg-gray-200 mb-px rounded-t-lg overflow-hidden">
                            {['Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab', 'Dom'].map(d => (
                                <div key={d} className="bg-gray-100 text-center py-2 text-xs font-semibold text-gray-600 uppercase">{d}</div>
                            ))}
                        </div>
                        <div className="grid grid-cols-7 gap-px bg-gray-200 rounded-b-lg overflow-hidden">
                            {days}
                        </div>
                    </div>
                );
            };

            // --- RENDER VISTA GIORNO ---
            const renderGiorno = () => {
                const dateStr = currentDate.toISOString().split('T')[0];
                const dayEvents = events.filter(e => e.event_date && e.event_date.startsWith(dateStr));

                return (
                    <div className="bg-white rounded-xl shadow p-6 fade-in min-h-[400px]">
                        <h3 className="text-2xl font-bold text-gray-800 border-b pb-4 mb-4">
                            {currentDate.toLocaleDateString('it-IT', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                        </h3>
                        {dayEvents.length === 0 ? (
                            <p className="text-gray-400 text-center py-12 italic">Nessun evento per questa giornata.</p>
                        ) : (
                            <ul className="space-y-4">
                                {dayEvents.map(ev => (
                                    <li key={ev.id} className="flex border-l-4 border-indigo-500 bg-gray-50 p-4 rounded-r-lg shadow-sm">
                                        <div className="font-bold text-indigo-600 w-28 flex-shrink-0 text-sm">
                                            {ev.event_time
                                                ? `${ev.event_time.substring(0,5)}${ev.event_end_time ? '–' + ev.event_end_time.substring(0,5) : ''}`
                                                : 'Tutto il giorno'}
                                        </div>
                                        <div>
                                            <h4 className="font-semibold text-gray-800">{ev.title}</h4>
                                            {ev.description && <p className="text-sm text-gray-500 mt-1">{ev.description}</p>}
                                        </div>
                                    </li>
                                ))}
                            </ul>
                        )}
                        <button
                            onClick={() => { setSelectedDate(dateStr); setShowNewEvent(true); }}
                            className="mt-6 flex items-center text-indigo-600 font-semibold hover:text-indigo-800 transition"
                        >
                            <i className="ph ph-plus-circle text-xl mr-2"></i> Aggiungi Evento
                        </button>
                    </div>
                );
            };

            // --- RENDER VISTA ANNO ---
            const renderAnno = () => (
                <div className="bg-white rounded-xl shadow p-8 text-center fade-in">
                    <h3 className="text-3xl font-bold text-gray-800 mb-4">{currentDate.getFullYear()}</h3>
                    <p className="text-gray-500 mb-8">Seleziona un mese per visualizzarne il dettaglio.</p>
                    <div className="grid grid-cols-3 md:grid-cols-4 gap-4">
                        {Array.from({length: 12}).map((_, i) => (
                            <div key={i}
                                onClick={() => {
                                    const nd = new Date(currentDate);
                                    nd.setMonth(i);
                                    setCurrentDate(nd);
                                    setView('Mese');
                                }}
                                className="p-4 border rounded-lg hover:bg-indigo-50 hover:border-indigo-300 cursor-pointer transition">
                                <div className="font-semibold text-gray-700 capitalize">
                                    {new Date(2020, i, 1).toLocaleDateString('it-IT', { month: 'long' })}
                                </div>
                                <div className="text-xs text-gray-400 mt-2">
                                    {events.filter(e => {
                                        if (!e.event_date) return false;
                                        const eDate = new Date(e.event_date);
                                        return eDate.getFullYear() === currentDate.getFullYear() && eDate.getMonth() === i;
                                    }).length} eventi
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // --- NAVIGAZIONE ---
            const handlePrev = () => {
                const nd = new Date(currentDate);
                if (view === 'Mese') nd.setMonth(nd.getMonth() - 1);
                if (view === 'Giorno') nd.setDate(nd.getDate() - 1);
                if (view === 'Anno') nd.setFullYear(nd.getFullYear() - 1);
                setCurrentDate(nd);
            };

            const handleNext = () => {
                const nd = new Date(currentDate);
                if (view === 'Mese') nd.setMonth(nd.getMonth() + 1);
                if (view === 'Giorno') nd.setDate(nd.getDate() + 1);
                if (view === 'Anno') nd.setFullYear(nd.getFullYear() + 1);
                setCurrentDate(nd);
            };

            const calendarIcon = (type) => {
                if (type === 'Ufficio') return 'ph-briefcase';
                if (type === 'Personale') return 'ph-user';
                return 'ph-calendar';
            };

            return (
                <div className="flex h-screen bg-gray-50 overflow-hidden">

                    {/* SIDEBAR */}
                    <div className="w-64 bg-white border-r shadow-sm flex flex-col z-10">
                        <div className="p-6 border-b flex items-center space-x-3">
                            <div className="bg-indigo-600 text-white p-2 rounded-lg">
                                <i className="ph ph-calendar-duotone text-2xl"></i>
                            </div>
                            <span className="font-bold text-xl text-gray-800">Calendari</span>
                        </div>

                        <div className="p-4 flex-1 overflow-y-auto">
                            <h3 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">I Miei Calendari</h3>
                            <div className="space-y-2">
                                {calendars.map(cal => (
                                    <button
                                        key={cal.id}
                                        onClick={() => setActiveCalId(cal.id)}
                                        className={`w-full flex items-center px-4 py-3 rounded-xl transition ${activeCalId === cal.id ? 'bg-indigo-50 text-indigo-700 font-semibold ring-1 ring-indigo-200' : 'text-gray-600 hover:bg-gray-50'}`}
                                    >
                                        <i className={`ph ${calendarIcon(cal.type)} text-xl mr-3`}></i>
                                        {cal.type}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* FOOTER SIDEBAR: utente + cambio password + logout */}
                        <div className="p-4 border-t space-y-2">
                            <div className="flex items-center justify-between">
                                <span className="text-sm font-medium text-gray-700 truncate flex items-center">
                                    <i className="ph ph-user-circle mr-2 text-lg"></i>{user}
                                </span>
                                <button
                                    onClick={onLogout}
                                    className="text-gray-400 hover:text-red-500 transition"
                                    title="Esci"
                                >
                                    <i className="ph ph-sign-out text-xl"></i>
                                </button>
                            </div>
                            <button
                                onClick={() => setShowChangePassword(true)}
                                className="w-full flex items-center justify-center space-x-2 px-3 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg transition"
                            >
                                <i className="ph ph-lock-key text-base"></i>
                                <span>Cambia Password</span>
                            </button>
                        </div>
                    </div>

                    {/* CONTENUTO PRINCIPALE */}
                    <div className="flex-1 flex flex-col min-w-0">

                        {/* HEADER */}
                        <header className="bg-white border-b px-8 py-4 flex items-center justify-between shadow-sm">
                            <div className="flex items-center space-x-3">
                                <button onClick={handlePrev} className="p-2 rounded-full hover:bg-gray-100 transition">
                                    <i className="ph ph-caret-left"></i>
                                </button>
                                <h2 className="text-xl font-bold text-gray-800 w-52 text-center capitalize">
                                    {view === 'Mese' && currentDate.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' })}
                                    {view === 'Giorno' && currentDate.toLocaleDateString('it-IT', { day: '2-digit', month: 'long', year: 'numeric' })}
                                    {view === 'Anno' && currentDate.getFullYear()}
                                </h2>
                                <button onClick={handleNext} className="p-2 rounded-full hover:bg-gray-100 transition">
                                    <i className="ph ph-caret-right"></i>
                                </button>
                                <button
                                    onClick={() => setCurrentDate(new Date())}
                                    className="ml-2 px-3 py-1.5 text-sm bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition font-medium"
                                >
                                    Oggi
                                </button>
                            </div>

                            <div className="flex bg-gray-100 p-1 rounded-lg">
                                {['Giorno', 'Mese', 'Anno'].map(v => (
                                    <button key={v} onClick={() => setView(v)}
                                        className={`px-4 py-1.5 text-sm rounded-md transition font-medium ${view === v ? 'bg-white text-indigo-700 shadow' : 'text-gray-500 hover:text-gray-700'}`}>
                                        {v}
                                    </button>
                                ))}
                            </div>
                        </header>

                        {/* BANNER PADRE PIO — visibile solo nel calendario Personale */}
                        {activeCalendar?.type === 'Personale' && padrePioThought && (
                            <div className="bg-[#fdf6e3] border-b border-[#e9ddb8] px-8 py-4 flex items-start space-x-4 fade-in">
                                <div className="bg-[#c9a86c] text-white p-2.5 rounded-full mt-0.5 flex-shrink-0">
                                    <i className="ph ph-quotes text-lg"></i>
                                </div>
                                <div>
                                    <h4 className="text-xs font-bold text-[#8a7040] uppercase tracking-widest mb-1">
                                        Pensiero del Giorno — Padre Pio
                                    </h4>
                                    <p className="text-base font-serif text-[#5c4a28] italic leading-relaxed">
                                        "{padrePioThought}"
                                    </p>
                                </div>
                            </div>
                        )}

                        {/* AREA CALENDARIO */}
                        <div className="flex-1 p-6 overflow-y-auto">
                            <div className="max-w-6xl mx-auto h-full">
                                {view === 'Mese' && renderMese()}
                                {view === 'Giorno' && renderGiorno()}
                                {view === 'Anno' && renderAnno()}
                            </div>
                        </div>
                    </div>

                    {/* MODALI */}
                    {showNewEvent && (
                        <NewEventModal
                            token={token}
                            activeCalId={activeCalId}
                            selectedDate={selectedDate}
                            onClose={() => setShowNewEvent(false)}
                            onSaved={() => loadEvents(activeCalId)}
                        />
                    )}

                    {showChangePassword && (
                        <ChangePasswordModal
                            token={token}
                            onClose={() => setShowChangePassword(false)}
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
