<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Calendar App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.25s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API_BASE = 'http://localhost:5000/api';

async function fetchAPI(endpoint, options = {}) {
    const res = await fetch(`${API_BASE}${endpoint}`, {
        ...options,
        headers: { 'Content-Type': 'application/json', ...options.headers }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `Errore ${res.status}`);
    return data;
}

// ── Shared small components ──────────────────────────────────
function ErrorBox({ message }) {
    if (!message) return null;
    return (
        <div className="mt-3 p-3 bg-red-50 border border-red-300 text-red-700 rounded-lg text-sm flex items-start space-x-2 fade-in">
            <i className="ph ph-warning-circle text-lg flex-shrink-0 mt-0.5"></i>
            <span>{message}</span>
        </div>
    );
}
function SuccessBox({ message }) {
    if (!message) return null;
    return (
        <div className="mt-3 p-3 bg-green-50 border border-green-300 text-green-700 rounded-lg text-sm flex items-start space-x-2 fade-in">
            <i className="ph ph-check-circle text-lg flex-shrink-0 mt-0.5"></i>
            <span>{message}</span>
        </div>
    );
}

// ── Role badge ───────────────────────────────────────────────
function RoleBadge({ role }) {
    const cfg = {
        admin: 'bg-purple-100 text-purple-700',
        capo:  'bg-amber-100 text-amber-700',
        user:  'bg-gray-100 text-gray-600'
    };
    const label = { admin: 'Admin', capo: 'Capo', user: 'Utente' };
    return (
        <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${cfg[role] || cfg.user}`}>
            {label[role] || role}
        </span>
    );
}

// ── App root ─────────────────────────────────────────────────
function App() {
    const [authState, setAuthState] = useState(null); // { username, token, role }
    if (!authState) return <Login onLogin={setAuthState} />;
    return <Dashboard auth={authState} onLogout={() => setAuthState(null)} />;
}

// ── Login / Register ─────────────────────────────────────────
function Login({ onLogin }) {
    const [isLogin, setIsLogin] = useState(true);
    const [username, setUsername] = useState('');
    const [email, setEmail]       = useState('');
    const [password, setPassword] = useState('');
    const [loading, setLoading]   = useState(false);
    const [error, setError]       = useState('');
    const [success, setSuccess]   = useState('');

    const reset = () => { setError(''); setSuccess(''); setUsername(''); setEmail(''); setPassword(''); };
    const switchMode = () => { setIsLogin(!isLogin); reset(); };

    const handleSubmit = async (e) => {
        e.preventDefault();
        setError(''); setSuccess(''); setLoading(true);
        try {
            if (isLogin) {
                const data = await fetchAPI('/auth/login', {
                    method: 'POST', body: JSON.stringify({ email, password })
                });
                onLogin({ username: data.username, token: data.token, role: data.role });
            } else {
                await fetchAPI('/auth/register', {
                    method: 'POST', body: JSON.stringify({ username, email, password })
                });
                setSuccess('Registrazione completata! Ora puoi accedere con la tua email.');
                setIsLogin(true); setUsername(''); setPassword('');
            }
        } catch (err) {
            setError(err.message || 'Errore di connessione. Verifica che il backend sia attivo.');
        } finally { setLoading(false); }
    };

    return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 to-indigo-100 p-4">
            <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md fade-in">
                <div className="flex justify-center mb-5 text-indigo-600">
                    <i className="ph ph-calendar-check text-6xl"></i>
                </div>
                <h2 className="text-2xl font-bold text-center text-gray-800 mb-7">
                    {isLogin ? 'Accedi ai tuoi Calendari' : 'Crea un Account'}
                </h2>
                <form onSubmit={handleSubmit} className="space-y-4">
                    {!isLogin && (
                        <div>
                            <label className="block text-sm font-medium text-gray-700">Username</label>
                            <input type="text" required value={username}
                                onChange={e => setUsername(e.target.value)}
                                className="mt-1 w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                                placeholder="mario_rossi" />
                        </div>
                    )}
                    <div>
                        <label className="block text-sm font-medium text-gray-700">Email</label>
                        <input type="email" required value={email}
                            onChange={e => setEmail(e.target.value)}
                            className="mt-1 w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                            placeholder="mario@esempio.it" />
                    </div>
                    <div>
                        <label className="block text-sm font-medium text-gray-700">Password</label>
                        <input type="password" required value={password}
                            onChange={e => setPassword(e.target.value)}
                            className="mt-1 w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                            placeholder={isLogin ? '••••••••' : 'Almeno 6 caratteri'} />
                    </div>
                    <ErrorBox message={error} />
                    <SuccessBox message={success} />
                    <button type="submit" disabled={loading}
                        className="w-full bg-indigo-600 text-white py-2.5 rounded-lg hover:bg-indigo-700 font-semibold disabled:opacity-60 transition">
                        {loading ? 'Caricamento...' : (isLogin ? 'Accedi' : 'Registrati')}
                    </button>
                </form>
                <p className="mt-5 text-center text-sm text-gray-600">
                    {isLogin ? 'Non hai un account? ' : 'Hai già un account? '}
                    <button onClick={switchMode} className="text-indigo-600 font-semibold hover:underline">
                        {isLogin ? 'Registrati' : 'Accedi'}
                    </button>
                </p>
            </div>
        </div>
    );
}

// ── Change Password Modal ────────────────────────────────────
function ChangePasswordModal({ token, onClose }) {
    const [oldPwd, setOldPwd] = useState('');
    const [newPwd, setNewPwd] = useState('');
    const [confirm, setConfirm] = useState('');
    const [loading, setLoading] = useState(false);
    const [error, setError]   = useState('');
    const [success, setSuccess] = useState('');

    const handleSubmit = async (e) => {
        e.preventDefault(); setError(''); setSuccess('');
        if (newPwd !== confirm) { setError('Le password non coincidono.'); return; }
        setLoading(true);
        try {
            const d = await fetchAPI('/auth/change-password', {
                method: 'PUT',
                body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd }),
                headers: { 'Authorization': `Bearer ${token}` }
            });
            setSuccess(d.message);
            setOldPwd(''); setNewPwd(''); setConfirm('');
        } catch (err) { setError(err.message); }
        finally { setLoading(false); }
    };

    return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 fade-in">
            <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md">
                <div className="flex justify-between items-center mb-5">
                    <h3 className="text-xl font-bold flex items-center space-x-2">
                        <i className="ph ph-lock-key text-indigo-600 text-2xl"></i>
                        <span>Cambia Password</span>
                    </h3>
                    <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><i className="ph ph-x text-xl"></i></button>
                </div>
                <form onSubmit={handleSubmit} className="space-y-4">
                    {[['Password Attuale', oldPwd, setOldPwd], ['Nuova Password', newPwd, setNewPwd], ['Conferma Nuova Password', confirm, setConfirm]].map(([label, val, setter]) => (
                        <div key={label}>
                            <label className="block text-sm font-medium text-gray-700">{label}</label>
                            <input type="password" required value={val} onChange={e => setter(e.target.value)}
                                className="mt-1 w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••" />
                        </div>
                    ))}
                    <ErrorBox message={error} />
                    <SuccessBox message={success} />
                    <div className="flex justify-end space-x-3 pt-1">
                        <button type="button" onClick={onClose} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition">Chiudi</button>
                        <button type="submit" disabled={loading}
                            className="px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold disabled:opacity-60 transition">
                            {loading ? 'Salvataggio...' : 'Aggiorna'}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    );
}

// ── Event Modal (crea e modifica) ───────────────────────────
// editEvent: null = nuovo evento, oppure oggetto evento da modificare
function EventModal({ token, activeCalId, activeCalIsGlobal, userRole, selectedDate, editEvent, onClose, onSaved }) {
    const isEdit = !!editEvent;
    const [loading, setLoading] = useState(false);
    const [error, setError]     = useState('');

    // Valori iniziali (modifica) o vuoti (nuovo)
    const [title, setTitle]         = useState(editEvent?.title || '');
    const [date, setDate]           = useState(editEvent?.event_date?.substring(0,10) || selectedDate);
    const [time, setTime]           = useState(editEvent?.event_time?.substring(0,5) || '');
    const [endTime, setEndTime]     = useState(editEvent?.event_end_time?.substring(0,5) || '');
    const [description, setDesc]    = useState(editEvent?.description || '');

    // Utenti normali non possono creare/modificare eventi Ufficio
    if (activeCalIsGlobal && !['capo', 'admin'].includes(userRole)) {
        return (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 fade-in">
                <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md text-center">
                    <i className="ph ph-lock text-5xl text-amber-400 mb-4"></i>
                    <h3 className="text-xl font-bold text-gray-800 mb-2">Accesso limitato</h3>
                    <p className="text-gray-500 mb-5">Solo i <strong>Capo</strong> e gli <strong>Admin</strong> possono modificare eventi Ufficio.</p>
                    <button onClick={onClose} className="px-5 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium transition">Chiudi</button>
                </div>
            </div>
        );
    }

    const handleSubmit = async (e) => {
        e.preventDefault(); setError(''); setLoading(true);
        try {
            if (isEdit) {
                await fetchAPI(`/events/${editEvent.id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ title, event_date: date, event_time: time || null, event_end_time: endTime || null, description }),
                    headers: { 'Authorization': `Bearer ${token}` }
                });
            } else {
                await fetchAPI('/events', {
                    method: 'POST',
                    body: JSON.stringify({ calendar_id: activeCalId, title, event_date: date, event_time: time || null, event_end_time: endTime || null, description }),
                    headers: { 'Authorization': `Bearer ${token}` }
                });
            }
            onSaved(); onClose();
        } catch (err) { setError(err.message); }
        finally { setLoading(false); }
    };

    const isOffice = isEdit ? editEvent.source === 'office' : activeCalIsGlobal;

    return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 fade-in">
            <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md">
                <div className="flex justify-between items-center mb-5">
                    <h3 className="text-xl font-bold text-gray-800">
                        {isEdit
                            ? (isOffice ? '✏️ Modifica Evento Ufficio' : '✏️ Modifica Evento Personale')
                            : (isOffice ? '📋 Nuovo Evento Ufficio'   : '👤 Nuovo Evento Personale')}
                    </h3>
                    <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><i className="ph ph-x text-xl"></i></button>
                </div>
                <form onSubmit={handleSubmit} className="space-y-4">
                    <div>
                        <label className="block text-sm font-medium text-gray-700">Titolo *</label>
                        <input required value={title} onChange={e => setTitle(e.target.value)}
                            className="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Titolo evento" />
                    </div>
                    <div>
                        <label className="block text-sm font-medium text-gray-700">Data *</label>
                        <input type="date" required value={date} onChange={e => setDate(e.target.value)}
                            className="w-full mt-1 p-2 border rounded-lg outline-none" />
                    </div>
                    <div className="flex space-x-3">
                        <div className="flex-1">
                            <label className="block text-sm font-medium text-gray-700">Ora inizio</label>
                            <input type="time" value={time} onChange={e => setTime(e.target.value)}
                                className="w-full mt-1 p-2 border rounded-lg outline-none" />
                        </div>
                        <div className="flex-1">
                            <label className="block text-sm font-medium text-gray-700">Ora fine</label>
                            <input type="time" value={endTime} onChange={e => setEndTime(e.target.value)}
                                className="w-full mt-1 p-2 border rounded-lg outline-none" />
                        </div>
                    </div>
                    <div>
                        <label className="block text-sm font-medium text-gray-700">Descrizione</label>
                        <textarea rows="3" value={description} onChange={e => setDesc(e.target.value)}
                            className="w-full mt-1 p-2 border rounded-lg outline-none resize-none" placeholder="Note aggiuntive..."></textarea>
                    </div>
                    <ErrorBox message={error} />
                    <div className="flex justify-end space-x-3 pt-1">
                        <button type="button" onClick={onClose} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition">Annulla</button>
                        <button type="submit" disabled={loading}
                            className="px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold disabled:opacity-60 transition">
                            {loading ? 'Salvataggio...' : (isEdit ? 'Salva Modifiche' : 'Crea Evento')}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    );
}

// ── Admin Panel ──────────────────────────────────────────────
function AdminPanel({ token, onClose }) {
    const [users, setUsers] = useState([]);
    const [loading, setLoading] = useState(true);
    const [error, setError] = useState('');
    const [success, setSuccess] = useState('');
    const [changing, setChanging] = useState(null);

    const loadUsers = async () => {
        setLoading(true); setError('');
        try {
            const data = await fetchAPI('/admin/users', { headers: { 'Authorization': `Bearer ${token}` } });
            setUsers(data);
        } catch (err) { setError(err.message); }
        finally { setLoading(false); }
    };

    useEffect(() => { loadUsers(); }, []);

    const changeRole = async (userId, newRole) => {
        setChanging(userId); setError(''); setSuccess('');
        try {
            const d = await fetchAPI(`/admin/users/${userId}/role`, {
                method: 'PUT',
                body: JSON.stringify({ role: newRole }),
                headers: { 'Authorization': `Bearer ${token}` }
            });
            setSuccess(d.message);
            setUsers(prev => prev.map(u => u.id === userId ? { ...u, role: newRole } : u));
        } catch (err) { setError(err.message); }
        finally { setChanging(null); }
    };

    return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 fade-in p-4">
            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col">
                <div className="flex justify-between items-center p-6 border-b">
                    <h2 className="text-xl font-bold text-gray-800 flex items-center space-x-2">
                        <i className="ph ph-shield-star text-purple-600 text-2xl"></i>
                        <span>Pannello Admin — Gestione Utenti</span>
                    </h2>
                    <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><i className="ph ph-x text-xl"></i></button>
                </div>
                <div className="p-6 overflow-y-auto flex-1">
                    <ErrorBox message={error} />
                    <SuccessBox message={success} />
                    {loading ? (
                        <div className="text-center py-10 text-gray-400">Caricamento utenti...</div>
                    ) : (
                        <table className="w-full text-sm mt-4">
                            <thead>
                                <tr className="text-left border-b text-gray-500 text-xs uppercase tracking-wide">
                                    <th className="pb-3 pr-4">Username</th>
                                    <th className="pb-3 pr-4">Email</th>
                                    <th className="pb-3 pr-4">Ruolo attuale</th>
                                    <th className="pb-3">Cambia ruolo</th>
                                </tr>
                            </thead>
                            <tbody>
                                {users.map(u => (
                                    <tr key={u.id} className="border-b last:border-0 hover:bg-gray-50">
                                        <td className="py-3 pr-4 font-medium text-gray-800">{u.username}</td>
                                        <td className="py-3 pr-4 text-gray-500">{u.email}</td>
                                        <td className="py-3 pr-4"><RoleBadge role={u.role} /></td>
                                        <td className="py-3">
                                            {u.role === 'admin' ? (
                                                <span className="text-xs text-gray-400 italic">Non modificabile</span>
                                            ) : (
                                                <div className="flex space-x-2">
                                                    <button
                                                        disabled={u.role === 'user' || changing === u.id}
                                                        onClick={() => changeRole(u.id, 'user')}
                                                        className="px-3 py-1 text-xs bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 disabled:opacity-40 disabled:cursor-not-allowed transition">
                                                        → Utente
                                                    </button>
                                                    <button
                                                        disabled={u.role === 'capo' || changing === u.id}
                                                        onClick={() => changeRole(u.id, 'capo')}
                                                        className="px-3 py-1 text-xs bg-amber-100 text-amber-700 rounded-lg hover:bg-amber-200 disabled:opacity-40 disabled:cursor-not-allowed transition">
                                                        → Capo
                                                    </button>
                                                </div>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    )}
                </div>
            </div>
        </div>
    );
}

// ── Dashboard ────────────────────────────────────────────────
function Dashboard({ auth, onLogout }) {
    const { username, token, role } = auth;
    const authHeaders = { 'Authorization': `Bearer ${token}` };

    const [calendars, setCalendars]           = useState([]);
    const [activeCalId, setActiveCalId]       = useState(null);
    const [events, setEvents]                 = useState([]);
    const [view, setView]                     = useState('Mese');
    const [currentDate, setCurrentDate]       = useState(new Date());
    const [padrePioThought, setPadrePioThought] = useState('');

    const [showNewEvent, setShowNewEvent]             = useState(false);
    const [editEvent, setEditEvent]                   = useState(null); // evento da modificare
    const [showChangePassword, setShowChangePassword] = useState(false);
    const [showAdminPanel, setShowAdminPanel]         = useState(false);
    const [selectedDate, setSelectedDate]             = useState('');

    const activeCalendar = calendars.find(c => c.id === activeCalId);
    const canEditActiveCalendar = activeCalendar?.is_global
        ? ['capo', 'admin'].includes(role)
        : true; // Personal: always editable by owner

    const loadCalendars = useCallback(async () => {
        try {
            const data = await fetchAPI('/calendars', { headers: authHeaders });
            setCalendars(data);
            if (data.length > 0) setActiveCalId(data[0].id);
        } catch (err) { console.error(err.message); }
    }, [token]);

    const loadEvents = useCallback(async (calId) => {
        if (!calId) return;
        try {
            const data = await fetchAPI(`/events/${calId}`, { headers: authHeaders });
            setEvents(data);
        } catch (err) { console.error(err.message); }
    }, [token]);

    const loadPadrePio = useCallback(async () => {
        try {
            const dateStr = currentDate.toISOString().split('T')[0];
            const d = await fetchAPI(`/padrepio/thought/${dateStr}`, { headers: authHeaders });
            setPadrePioThought(d.thought);
        } catch { setPadrePioThought(''); }
    }, [currentDate, token]);

    useEffect(() => { loadCalendars(); }, []);
    useEffect(() => { loadEvents(activeCalId); }, [activeCalId, currentDate, view]);
    useEffect(() => {
        if (activeCalendar?.type === 'Personale') loadPadrePio();
        else setPadrePioThought('');
    }, [activeCalId, calendars, currentDate]);

    // ── Overlap detection helpers ────────────────────────────────
    const timeToMinutes = (t) => {
        if (!t) return null;
        const [h, m] = t.substring(0, 5).split(':').map(Number);
        return h * 60 + m;
    };

    // Returns true if two events overlap in time on the same date
    const eventsOverlap = (a, b) => {
        if (a.event_date !== b.event_date) return false;
        const aStart = timeToMinutes(a.start_time || a.event_time);
        const aEnd   = timeToMinutes(a.end_time   || a.event_end_time);
        const bStart = timeToMinutes(b.start_time || b.event_time);
        const bEnd   = timeToMinutes(b.end_time   || b.event_end_time);
        if (aStart === null || aEnd === null || bStart === null || bEnd === null) return false;
        return aStart < bEnd && aEnd > bStart;
    };

    // Returns a Set of event ids that overlap with at least one other event
    const getOverlappingIds = (evList) => {
        const ids = new Set();
        for (let i = 0; i < evList.length; i++) {
            for (let j = i + 1; j < evList.length; j++) {
                if (eventsOverlap(evList[i], evList[j])) {
                    ids.add(evList[i].id + '-' + evList[i].source);
                    ids.add(evList[j].id + '-' + evList[j].source);
                }
            }
        }
        return ids;
    };

    // ── Event styling by source + overlap state ───────────────────
    const eventStyle = (ev, isOverlapping) => {
        if (isOverlapping) {
            // Striped gradient to signal overlap — visible regardless of type
            if (ev.source === 'office')
                return 'text-orange-900 border border-orange-400 bg-gradient-to-r from-amber-200 via-orange-100 to-red-100 font-semibold';
            return 'text-purple-900 border border-purple-400 bg-gradient-to-r from-indigo-200 via-purple-100 to-pink-100 font-semibold';
        }
        if (ev.source === 'office') return 'bg-amber-100 text-amber-800 border-l-2 border-amber-400';
        return 'bg-indigo-100 text-indigo-800 border-l-2 border-indigo-300';
    };

    const eventDotColor = (ev) => ev.source === 'office' ? 'bg-amber-400' : 'bg-indigo-400';

    // ── Calendar renders ─────────────────────────────────────
    const renderMese = () => {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDay = new Date(year, month, 1).getDay();
        const days = [];
        const todayStr = new Date().toISOString().split('T')[0];

        // Empty cells before the 1st of the month (Monday-based grid)
        for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) {
            days.push(<div key={`e-${i}`} className="bg-gray-50 border border-gray-100 min-h-[90px]"></div>);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayEvents = events.filter(e => e.event_date && e.event_date.startsWith(dateStr));
            const dayOverlapIds = getOverlappingIds(dayEvents);
            const isToday = todayStr === dateStr;

            days.push(
                <div key={d}
                    className={`min-h-[90px] bg-white border border-gray-200 p-1.5 cursor-pointer hover:bg-blue-50 transition ${isToday ? 'ring-2 ring-inset ring-indigo-500' : ''}`}
                    onClick={() => { setSelectedDate(dateStr); setEditEvent(null); setShowNewEvent(true); }}>

                    {/* Day number */}
                    <div className={`text-xs font-bold mb-1 ${isToday ? 'text-indigo-600' : 'text-gray-600'}`}>{d}</div>

                    {/* Event chips */}
                    <div className="space-y-0.5">
                        {dayEvents.slice(0, 3).map(ev => {
                            const key = `${ev.id}-${ev.source}`;
                            const isOvlp = dayOverlapIds.has(key);
                            const timeLabel = (ev.start_time || ev.event_time)
                                ? (ev.start_time || ev.event_time).substring(0, 5) + ' '
                                : '';
                            return (
                                <div key={key}
                                    onClick={e => {
                                        e.stopPropagation();
                                        if (ev.source === 'office' && !['capo','admin'].includes(role)) return;
                                        setEditEvent(ev);
                                        setShowNewEvent(true);
                                    }}
                                    className={`text-xs px-1.5 py-0.5 rounded truncate cursor-pointer hover:opacity-80 transition ${eventStyle(ev, isOvlp)}`}
                                    title={`${ev.source === 'office' ? '[Ufficio] ' : ''}${ev.title}${isOvlp ? ' ⚠ Sovrapposizione' : ''}`}>
                                    {isOvlp ? '⚠ ' : ''}{timeLabel}{ev.title}
                                </div>
                            );
                        })}

                        {/* Overflow counter */}
                        {dayEvents.length > 3 && (
                            <div className="text-xs text-gray-400 pl-1">+{dayEvents.length - 3} altri</div>
                        )}
                    </div>
                </div>
            );
        }

        return (
            <div className="fade-in">
                {/* Day-of-week header */}
                <div className="grid grid-cols-7 gap-px bg-gray-200 mb-px rounded-t-lg overflow-hidden">
                    {['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map(d => (
                        <div key={d} className="bg-gray-100 text-center py-2 text-xs font-semibold text-gray-500 uppercase">{d}</div>
                    ))}
                </div>

                {/* Day cells */}
                <div className="grid grid-cols-7 gap-px bg-gray-200 rounded-b-lg overflow-hidden">
                    {days}
                </div>

                {/* Legend — only in Personal calendar view */}
                {activeCalendar?.type === 'Personale' && (
                    <div className="mt-3 flex flex-wrap items-center gap-3 text-xs text-gray-500">
                        <span className="flex items-center space-x-1.5">
                            <span className="w-3 h-3 rounded bg-indigo-400 inline-block border-l-2 border-indigo-600"></span>
                            <span>Personale</span>
                        </span>
                        <span className="flex items-center space-x-1.5">
                            <span className="w-3 h-3 rounded bg-amber-300 inline-block border-l-2 border-amber-500"></span>
                            <span>Ufficio (condiviso)</span>
                        </span>
                        <span className="flex items-center space-x-1.5">
                            <span className="w-3 h-3 rounded inline-block border border-purple-400" style={{background:'linear-gradient(to right,#c7d2fe,#f3e8ff)'}}></span>
                            <span>Personale sovrapposto</span>
                        </span>
                        <span className="flex items-center space-x-1.5">
                            <span className="w-3 h-3 rounded inline-block border border-orange-400" style={{background:'linear-gradient(to right,#fde68a,#fed7aa)'}}></span>
                            <span>Ufficio sovrapposto</span>
                        </span>
                    </div>
                )}
            </div>
        );
    };

    const renderGiorno = () => {
        const dateStr = currentDate.toISOString().split('T')[0];
        const dayEvents = events.filter(e => e.event_date && e.event_date.startsWith(dateStr));
        const overlapIds = getOverlappingIds(dayEvents);

        return (
            <div className="bg-white rounded-xl shadow p-6 fade-in min-h-[400px]">
                <h3 className="text-xl font-bold text-gray-800 border-b pb-4 mb-4 capitalize">
                    {currentDate.toLocaleDateString('it-IT', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}
                </h3>
                {dayEvents.length === 0 ? (
                    <p className="text-gray-400 text-center py-12 italic">Nessun evento per questa giornata.</p>
                ) : (
                    <ul className="space-y-2">
                        {dayEvents.map(ev => {
                            const key = `${ev.id}-${ev.source}`;
                            const isOvlp = overlapIds.has(key);
                            const isOffice = ev.source === 'office';
                            const startT = ev.start_time || ev.event_time;
                            const endT   = ev.end_time   || ev.event_end_time;
                            const borderColor = isOvlp
                                ? (isOffice ? 'border-orange-400' : 'border-purple-400')
                                : (isOffice ? 'border-amber-400'  : 'border-indigo-400');
                            const bgColor = isOvlp
                                ? (isOffice ? 'bg-orange-50' : 'bg-purple-50')
                                : (isOffice ? 'bg-amber-50'  : 'bg-gray-50');
                            const timeColor = isOvlp
                                ? (isOffice ? 'text-orange-600' : 'text-purple-600')
                                : (isOffice ? 'text-amber-600'  : 'text-indigo-600');
                            return (
                                <li key={key} className={`flex border-l-4 ${borderColor} ${bgColor} p-3 rounded-r-lg shadow-sm`}>
                                    <div className={`font-bold w-28 flex-shrink-0 text-sm ${timeColor}`}>
                                        {startT
                                            ? `${startT.substring(0,5)}${endT ? '–' + endT.substring(0,5) : ''}`
                                            : 'Tutto il giorno'}
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <div className="flex items-center flex-wrap gap-1.5">
                                            <h4 className="font-semibold text-gray-800 truncate">{ev.title}</h4>
                                            {isOffice && (
                                                <span className="text-xs bg-amber-200 text-amber-700 px-1.5 py-0.5 rounded font-medium flex-shrink-0">Ufficio</span>
                                            )}
                                            {isOvlp && (
                                                <span className="text-xs bg-red-100 text-red-600 border border-red-300 px-1.5 py-0.5 rounded font-medium flex-shrink-0">
                                                    ⚠ Sovrapposizione
                                                </span>
                                            )}
                                        </div>
                                        {ev.description && <p className="text-xs text-gray-500 mt-0.5 truncate">{ev.description}</p>}
                                    </div>
                                    {(isOffice ? ['capo','admin'].includes(role) : true) && (
                                        <div className="flex items-center space-x-1 ml-2 flex-shrink-0">
                                            <button
                                                onClick={e => { e.stopPropagation(); setEditEvent(ev); setShowNewEvent(true); }}
                                                className="p-1 text-gray-300 hover:text-indigo-500 transition" title="Modifica">
                                                <i className="ph ph-pencil text-base"></i>
                                            </button>
                                            <button
                                                onClick={async (e) => {
                                                    e.stopPropagation();
                                                    if (!confirm(`Eliminare "${ev.title}"?`)) return;
                                                    try {
                                                        await fetchAPI(`/events/${ev.id}`, { method: 'DELETE', headers: authHeaders });
                                                        loadEvents(activeCalId);
                                                    } catch (err) { alert(err.message); }
                                                }}
                                                className="p-1 text-gray-300 hover:text-red-400 transition" title="Elimina">
                                                <i className="ph ph-trash text-base"></i>
                                            </button>
                                        </div>
                                    )}
                                </li>
                            );
                        })}
                    </ul>
                )}
                <button onClick={() => { setSelectedDate(dateStr); setEditEvent(null); setShowNewEvent(true); }}
                    className="mt-5 flex items-center text-indigo-600 font-semibold hover:text-indigo-800 transition text-sm">
                    <i className="ph ph-plus-circle text-xl mr-2"></i> Aggiungi Evento
                </button>
            </div>
        );
    };

    // ── Navigation ───────────────────────────────────────────
    const navigate = (dir) => {
        const nd = new Date(currentDate);
        if (view === 'Mese')  nd.setMonth(nd.getMonth() + dir);
        if (view === 'Giorno') nd.setDate(nd.getDate() + dir);
        if (view === 'Anno')  nd.setFullYear(nd.getFullYear() + dir);
        setCurrentDate(nd);
    };

    const calIcon = (type) => type === 'Ufficio' ? 'ph-briefcase' : 'ph-user';

    return (
        <div className="flex h-screen bg-gray-50 overflow-hidden">

            {/* ── SIDEBAR ── */}
            <div className="w-64 bg-white border-r shadow-sm flex flex-col z-10">
                <div className="p-5 border-b flex items-center space-x-3">
                    <div className="bg-indigo-600 text-white p-2 rounded-lg">
                        <i className="ph ph-calendar-duotone text-2xl"></i>
                    </div>
                    <span className="font-bold text-xl text-gray-800">Calendari</span>
                </div>

                <div className="p-4 flex-1 overflow-y-auto">
                    <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">I Miei Calendari</p>
                    <div className="space-y-1">
                        {calendars.map(cal => (
                            <button key={cal.id} onClick={() => setActiveCalId(cal.id)}
                                className={`w-full flex items-center px-3 py-2.5 rounded-xl transition text-sm ${activeCalId === cal.id ? 'bg-indigo-50 text-indigo-700 font-semibold ring-1 ring-indigo-200' : 'text-gray-600 hover:bg-gray-50'}`}>
                                <i className={`ph ${calIcon(cal.type)} text-lg mr-3`}></i>
                                <span>{cal.type}</span>
                                {!!cal.is_global && (
                                    <span className="ml-auto text-xs bg-amber-100 text-amber-600 px-1.5 py-0.5 rounded-full font-medium">Condiviso</span>
                                )}
                            </button>
                        ))}
                    </div>

                    {/* Admin Panel link */}
                    {role === 'admin' && (
                        <div className="mt-5">
                            <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Amministrazione</p>
                            <button onClick={() => setShowAdminPanel(true)}
                                className="w-full flex items-center px-3 py-2.5 rounded-xl text-sm text-purple-700 bg-purple-50 hover:bg-purple-100 font-semibold transition">
                                <i className="ph ph-shield-star text-lg mr-3"></i>
                                Pannello Admin
                            </button>
                        </div>
                    )}
                </div>

                {/* Footer */}
                <div className="p-4 border-t space-y-2">
                    <div className="flex items-center justify-between">
                        <div className="flex items-center space-x-2 min-w-0">
                            <i className="ph ph-user-circle text-gray-500 text-lg flex-shrink-0"></i>
                            <span className="text-sm font-medium text-gray-700 truncate">{username}</span>
                        </div>
                        <div className="flex items-center space-x-1">
                            <RoleBadge role={role} />
                            <button onClick={onLogout} className="ml-1 text-gray-400 hover:text-red-500 transition" title="Esci">
                                <i className="ph ph-sign-out text-lg"></i>
                            </button>
                        </div>
                    </div>
                    <button onClick={() => setShowChangePassword(true)}
                        className="w-full flex items-center justify-center space-x-2 px-3 py-1.5 text-xs text-gray-500 hover:bg-gray-100 rounded-lg transition">
                        <i className="ph ph-lock-key"></i><span>Cambia Password</span>
                    </button>
                </div>
            </div>

            {/* ── MAIN ── */}
            <div className="flex-1 flex flex-col min-w-0">

                {/* Header */}
                <header className="bg-white border-b px-8 py-3 flex items-center justify-between shadow-sm">
                    <div className="flex items-center space-x-3">
                        <button onClick={() => navigate(-1)} className="p-2 rounded-full hover:bg-gray-100 transition"><i className="ph ph-caret-left"></i></button>
                        <h2 className="text-lg font-bold text-gray-800 w-52 text-center capitalize">
                            {view === 'Mese'  && currentDate.toLocaleDateString('it-IT',{month:'long',year:'numeric'})}
                            {view === 'Giorno' && currentDate.toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'})}
                            {view === 'Anno'  && currentDate.getFullYear()}
                        </h2>
                        <button onClick={() => navigate(1)} className="p-2 rounded-full hover:bg-gray-100 transition"><i className="ph ph-caret-right"></i></button>
                        <button onClick={() => setCurrentDate(new Date())}
                            className="ml-2 px-3 py-1 text-sm bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition font-medium">
                            Oggi
                        </button>
                    </div>
                    <div className="flex items-center space-x-3">
                        {/* Pulsante aggiungi evento — nascosto per utenti normali su calendario Ufficio */}
                        {canEditActiveCalendar && (
                            <button onClick={() => { setSelectedDate(new Date().toISOString().split('T')[0]); setEditEvent(null); setShowNewEvent(true); }}
                                className="flex items-center space-x-1.5 px-4 py-1.5 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700 transition font-semibold">
                                <i className="ph ph-plus text-base"></i><span>Nuovo Evento</span>
                            </button>
                        )}
                        <div className="flex bg-gray-100 p-1 rounded-lg">
                            {['Giorno','Mese','Anno'].map(v => (
                                <button key={v} onClick={() => setView(v)}
                                    className={`px-3 py-1.5 text-sm rounded-md transition font-medium ${view === v ? 'bg-white text-indigo-700 shadow' : 'text-gray-500 hover:text-gray-700'}`}>
                                    {v}
                                </button>
                            ))}
                        </div>
                    </div>
                </header>

                {/* Padre Pio banner — solo in calendario Personale */}
                {activeCalendar?.type === 'Personale' && !!padrePioThought && (
                    <div className="bg-[#fdf6e3] border-b border-[#e9ddb8] px-8 py-3 flex items-start space-x-4 fade-in">
                        <div className="bg-[#c9a86c] text-white p-2 rounded-full mt-0.5 flex-shrink-0">
                            <i className="ph ph-quotes text-base"></i>
                        </div>
                        <div>
                            <p className="text-xs font-bold text-[#8a7040] uppercase tracking-widest mb-0.5">Pensiero del Giorno — Padre Pio</p>
                            <p className="text-sm font-serif text-[#5c4a28] italic">"{padrePioThought}"</p>
                        </div>
                    </div>
                )}

                {/* Read-only banner per utenti normali in vista Ufficio */}
                {!!activeCalendar?.is_global && !['capo','admin'].includes(role) && (
                    <div className="bg-amber-50 border-b border-amber-200 px-8 py-2 flex items-center space-x-2 text-amber-700 text-sm">
                        <i className="ph ph-eye text-base"></i>
                        <span>Stai visualizzando il calendario Ufficio condiviso. Solo i <strong>Capo</strong> possono modificarlo.</span>
                    </div>
                )}

                {/* Calendar area */}
                <div className="flex-1 p-6 overflow-y-auto">
                    <div className="max-w-6xl mx-auto">
                        {view === 'Mese'  && renderMese()}
                        {view === 'Giorno' && renderGiorno()}
                        {view === 'Anno'  && renderAnno()}
                    </div>
                </div>
            </div>

            {/* ── MODALI ── */}
            {showNewEvent && (
                <EventModal
                    token={token}
                    activeCalId={activeCalId}
                    activeCalIsGlobal={editEvent ? editEvent.source === 'office' : !!activeCalendar?.is_global}
                    userRole={role}
                    selectedDate={selectedDate}
                    editEvent={editEvent}
                    onClose={() => { setShowNewEvent(false); setEditEvent(null); }}
                    onSaved={() => loadEvents(activeCalId)}
                />
            )}
            {showChangePassword && <ChangePasswordModal token={token} onClose={() => setShowChangePassword(false)} />}
            {showAdminPanel && <AdminPanel token={token} onClose={() => setShowAdminPanel(false)} />}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
