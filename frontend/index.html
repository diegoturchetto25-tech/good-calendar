                    <button onClick={()=>setShowChangePassword(true)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px',padding:'7px',background:'rgba(255,255,255,0.22)',border:'1px solid rgba(255,255,255,0.40)',borderRadius:'10px',cursor:'pointer',fontSize:'12px',color:'rgba(60,60,120,.55)',fontFamily:'var(--font)',transition:'all .18s'}} onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.35)';}} onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.22)';}}>
                        <i className="ph ph-lock-key" style={{fontSize:'13px'}}></i> Cambia Password
                    </button>
                </div>
            </div>

            {/* ── MAIN ────────────────────────────────────── */}
            <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>

                {/* Header */}
                <div className="glass" style={{padding:'12px 24px',borderRadius:0,borderTop:'none',borderLeft:'none',borderRight:'none',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                        <button onClick={()=>navigate(-1)} className="glass" style={{padding:'6px 9px',borderRadius:'10px',border:'1px solid rgba(255,255,255,0.50)',cursor:'pointer',transition:'all .18s',color:'rgba(40,40,90,.65)'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.38)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.22)'}><i className="ph ph-caret-left" style={{fontSize:'14px'}}></i></button>
                        <div style={{minWidth:'180px',textAlign:'center',fontSize:'15px',fontWeight:600,color:'rgba(15,15,40,.82)',letterSpacing:'-.02em',textTransform:'capitalize'}}>
                            {view==='Mese'  && currentDate.toLocaleDateString('it-IT',{month:'long',year:'numeric'})}
                            {view==='Giorno'&& currentDate.toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'})}
                            {view==='Anno'  && currentDate.getFullYear()}
                        </div>
                        <button onClick={()=>navigate(1)} className="glass" style={{padding:'6px 9px',borderRadius:'10px',border:'1px solid rgba(255,255,255,0.50)',cursor:'pointer',transition:'all .18s',color:'rgba(40,40,90,.65)'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.38)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.22)'}><i className="ph ph-caret-right" style={{fontSize:'14px'}}></i></button>
                        <button onClick={()=>setCurrentDate(new Date())} className="glass" style={{marginLeft:'4px',padding:'5px 12px',borderRadius:'10px',border:'1px solid rgba(255,255,255,0.50)',cursor:'pointer',fontSize:'12px',fontWeight:600,color:'rgba(40,40,90,.65)',fontFamily:'var(--font)',transition:'all .18s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.38)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.22)'}>Oggi</button>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                        {canEdit&&(
                            <button onClick={()=>{setSelectedDate(new Date().toISOString().split('T')[0]);setEditEvent(null);setShowNewEvent(true);}} className="btn-p" style={{padding:'7px 16px',fontSize:'13px',display:'flex',alignItems:'center',gap:'6px'}}>
                                <i className="ph ph-plus" style={{fontSize:'14px'}}></i>Nuovo Evento
                            </button>
                        )}
                        <div className="vsw">
                            {['Giorno','Mese','Anno'].map(v=>(
                                <button key={v} onClick={()=>setView(v)} className={`vbtn${view===v?' active':''}`}>{v}</button>
                            ))}
                        </div>
                    </div>
                </div>

                {/* Padre Pio banner */}
                {activeCalendar?.type==='Personale' && !!padrePioThought && (
                    <div className="fi" style={{background:'linear-gradient(90deg,rgba(255,220,140,0.22),rgba(255,200,100,0.14))',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',borderBottom:'1px solid rgba(255,180,60,0.20)',padding:'12px 24px',display:'flex',alignItems:'flex-start',gap:'14px'}}>
                        <div style={{background:'linear-gradient(145deg,rgba(255,180,60,0.70),rgba(255,140,20,0.80))',padding:'6px 8px',borderRadius:'10px',flexShrink:0,boxShadow:'0 2px 10px rgba(255,159,10,0.22)'}}>
                            <i className="ph ph-quotes" style={{fontSize:'14px',color:'#fff'}}></i>
                        </div>
                        <div>
                            <div style={{fontSize:'9.5px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'rgba(140,90,0,.60)',marginBottom:'3px'}}>Pensiero del Giorno — Padre Pio</div>
                            <p style={{fontSize:'13px',fontStyle:'italic',color:'rgba(100,60,0,.80)'}}>" {padrePioThought} "</p>
                        </div>
                    </div>
                )}

                {/* Read-only banner */}
                {!!activeCalendar?.is_global && !['capo','admin'].includes(role) && (
                    <div style={{background:'rgba(255,159,10,0.10)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',borderBottom:'1px solid rgba(255,159,10,0.20)',padding:'9px 24px',display:'flex',alignItems:'center',gap:'8px'}}>
                        <i className="ph ph-eye" style={{fontSize:'14px',color:'rgba(160,100,0,.80)'}}></i>
                        <span style={{fontSize:'13px',color:'rgba(120,70,0,.80)'}}>Stai visualizzando il calendario Ufficio condiviso. Solo i <strong>Capo</strong> possono modificarlo.</span>
                    </div>
                )}

                {/* Calendar area + side panel */}
                <div style={{flex:1,display:'flex',overflow:'hidden'}}>
                    <div style={{flex:1,padding:'20px',overflowY:'auto'}}>
                        <div style={{maxWidth:'1100px',margin:'0 auto'}}>
                            {view==='Mese'  && renderMese()}
                            {view==='Giorno'&& renderGiorno()}
                            {view==='Anno'  && renderAnno()}
                        </div>
                    </div>
                    {view!=='Anno' && (
                        <UpcomingPanel
                            events={allEvents}
                            userRole={role}
                            onEditEvent={ev=>{setEditEvent(ev);setShowNewEvent(true);}}
                            onDeleteEvent={async ev=>{
                                if(!confirm(`Eliminare "${ev.title}"?`))return;
                                try{await fetchAPI(`/events/${ev.id}`,{method:'DELETE',headers:authHeaders});loadEvents(activeCalId);}
                                catch(err){alert(err.message);}
                            }}
                        />
                    )}
                </div>
            </div>

            {/* ── MODALS ──────────────────────────────────── */}
            {showNewEvent&&(
                <EventModal token={token} activeCalId={activeCalId}
                    activeCalIsGlobal={editEvent?editEvent.source==='office':!!activeCalendar?.is_global}
                    userRole={role} selectedDate={selectedDate} editEvent={editEvent}
                    onClose={()=>{setShowNewEvent(false);setEditEvent(null);}}
                    onSaved={()=>loadEvents(activeCalId)} />
            )}
            {showChangePassword&&<ChangePasswordModal token={token} onClose={()=>setShowChangePassword(false)}/>}
            {showAdminPanel&&<AdminPanel token={token} onClose={()=>setShowAdminPanel(false)}/>}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
